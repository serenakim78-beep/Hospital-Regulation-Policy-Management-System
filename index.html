<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구글 시트 데이터 표시</title>
    <style>
        body { font-family: Arial, sans-serif; }
        .container { width: 80%; margin: auto; }
        .data-card { border: 1px solid #ccc; margin: 10px 0; padding: 10px; }
        .data-card h3 { margin: 0; }
    </style>
</head>
<body>
    <div class="container">
        <h1>구글 시트 데이터</h1>
        <div id="data-container"></div>
    </div>

    <script>
        const SHEET_ID = "18dDgxsczklu9FRm053w2rqLDFDjqm7C18rijuyJdrkI";
        const RANGE = "A1:G"; // 필요한 범위로 조정하세요.

        async function fetchData() {
            const response = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&tq=SELECT * WHERE Col1 IS NOT NULL`);
            const json = await response.json();
            const data = json.table.rows;

            const container = document.getElementById('data-container');
            data.forEach(row => {
                const card = document.createElement('div');
                card.className = 'data-card';
                card.innerHTML = `
                    <h3>직군: ${row.c[0]?.v}</h3>
                    <p>등급: ${row.c[1]?.v}</p>
                    <p>구분: ${row.c[2]?.v}</p>
                    <p>CHAPTER: ${row.c[3]?.v}</p>
                    <p>기준제목: ${row.c[4]?.v}</p>
                    <p>조사항목: ${row.c[5]?.v}</p>
                    <p>조사내용: ${row.c[6]?.v}</p>
                `;
                container.appendChild(card);
            });
        }

        fetchData();
    </script>
</body>
</html>
