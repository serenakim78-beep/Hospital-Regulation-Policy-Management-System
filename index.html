<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>한서재활요양병원 규정 뷰어</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0b09;
      --surface: #141210;
      --surface2: #1c1916;
      --surface3: #242018;
      --gold: #c9a84c;
      --gold2: #e8c97a;
      --gold-dim: rgba(201,168,76,0.15);
      --text: #ede8df;
      --text-muted: #7a7060;
      --text-mid: #a89880;
      --border: #2a2520;
      --border2: #3a342c;
      --success: #6db98a;
      --warning: #c9a84c;
      --danger: #c97a6d;
      --blue: #7a9fc9;
      --blue-dim: rgba(122,159,201,0.15);
      --teal: #6db9b0;
      --teal-dim: rgba(109,185,176,0.15);
      --purple: #a87ac9;
      --purple-dim: rgba(168,122,201,0.15);
      --pink: #c97aa0;
      --pink-dim: rgba(201,122,160,0.15);
      --green: #7ac9a0;
      --green-dim: rgba(122,201,160,0.15);
      --orange: #c9a07a;
      --orange-dim: rgba(201,160,122,0.15);
      --sidebar-w: 230px;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* grain overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.35;
    }

    /* ── SCROLL PROGRESS BAR ── */
    #scrollBar {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      z-index: 1000;
      transition: width 0.1s linear;
    }

    /* ── HEADER ── */
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 200;
      flex-shrink: 0;
    }

    .logo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      width: 26px;
      height: 26px;
      flex-shrink: 0;
    }
    .logo-grid span { border-radius: 2px; background: var(--gold); transition: opacity 0.3s; }
    .logo-grid span:nth-child(2) { background: var(--gold2); opacity: 0.6; }
    .logo-grid span:nth-child(3) { background: var(--gold2); opacity: 0.4; }
    .logo-grid span:nth-child(4) { background: var(--gold);  opacity: 0.8; }
    header:hover .logo-grid span { opacity: 1 !important; }

    .header-titles { display: flex; flex-direction: column; gap: 1px; }
    .header-sub  { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2.5px; color: var(--text-muted); text-transform: uppercase; }
    .header-main { font-family: 'Noto Serif KR', serif; font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .header-status {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--warning);
      animation: pulse 2.5s infinite;
      flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* header action buttons */
    .hdr-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 6px 11px;
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.5px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.18s;
      display: flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
    }
    .hdr-btn:hover { border-color: var(--border2); color: var(--text); background: var(--surface3); }
    .hdr-btn svg { flex-shrink: 0; }

    /* ── LAYOUT ── */
    .app-body { display: flex; flex: 1; min-height: 0; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      position: sticky;
      top: 53px;
      height: calc(100vh - 53px);
      overflow-y: auto;
      padding: 18px 0;
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .sidebar::-webkit-scrollbar { width: 3px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .sidebar-section-label {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      color: var(--text-muted);
      text-transform: uppercase;
      padding: 10px 18px 4px;
    }
    .sidebar-sep { height: 1px; background: var(--border); margin: 8px 18px; }

    .tab-btn {
      display: flex;
      align-items: center;
      padding: 9px 14px 9px 18px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      border: none;
      background: transparent;
      width: 100%;
      text-align: left;
      transition: all 0.16s;
      gap: 9px;
      border-left: 2px solid transparent;
    }
    .tab-btn:hover { background: var(--surface2); color: var(--text-mid); }
    .tab-btn.active { color: var(--gold); background: var(--gold-dim); border-left-color: var(--gold); }
    .tab-btn.active.purple-tab { color: var(--purple); background: var(--purple-dim); border-left-color: var(--purple); }
    .tab-btn.active.pink-tab   { color: var(--pink);   background: var(--pink-dim);   border-left-color: var(--pink); }
    .tab-btn.active.green-tab  { color: var(--green);  background: var(--green-dim);  border-left-color: var(--green); }
    .tab-btn.active.orange-tab { color: var(--orange); background: var(--orange-dim); border-left-color: var(--orange); }
    .tab-btn.active.gray-tab   { color: var(--text-mid); background: var(--surface3); border-left-color: var(--text-mid); }
    .tab-btn.active.blue-tab   { color: var(--blue);   background: var(--blue-dim);   border-left-color: var(--blue); }
    .tab-btn.active.teal-tab   { color: var(--teal);   background: var(--teal-dim);   border-left-color: var(--teal); }

    .tab-dot { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; background: var(--border2); }
    .tab-btn.active .tab-dot         { background: var(--gold); }
    .tab-btn.active.purple-tab .tab-dot { background: var(--purple); }
    .tab-btn.active.pink-tab   .tab-dot { background: var(--pink); }
    .tab-btn.active.green-tab  .tab-dot { background: var(--green); }
    .tab-btn.active.orange-tab .tab-dot { background: var(--orange); }
    .tab-btn.active.gray-tab   .tab-dot { background: var(--text-mid); }
    .tab-btn.active.blue-tab   .tab-dot { background: var(--blue); }
    .tab-btn.active.teal-tab   .tab-dot { background: var(--teal); }

    .tab-label { flex: 1; }

    .tab-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 20px;
      padding: 1px 7px;
      flex-shrink: 0;
      min-width: 26px;
      text-align: center;
    }
    .tab-btn.active .tab-badge         { border-color: var(--gold);     color: var(--gold);     background: var(--gold-dim); }
    .tab-btn.active.purple-tab .tab-badge { border-color: var(--purple); color: var(--purple); background: var(--purple-dim); }
    .tab-btn.active.pink-tab   .tab-badge { border-color: var(--pink);   color: var(--pink);   background: var(--pink-dim); }
    .tab-btn.active.green-tab  .tab-badge { border-color: var(--green);  color: var(--green);  background: var(--green-dim); }
    .tab-btn.active.orange-tab .tab-badge { border-color: var(--orange); color: var(--orange); background: var(--orange-dim); }
    .tab-btn.active.gray-tab   .tab-badge { border-color: var(--text-mid); color: var(--text-mid); background: var(--surface3); }
    .tab-btn.active.blue-tab   .tab-badge { border-color: var(--blue);   color: var(--blue);   background: var(--blue-dim); }
    .tab-btn.active.teal-tab   .tab-badge { border-color: var(--teal);   color: var(--teal);   background: var(--teal-dim); }

    /* keyboard shortcut hint */
    .tab-key-hint {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      color: var(--text-muted);
      opacity: 0;
      transition: opacity 0.2s;
      background: var(--surface3);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 1px 4px;
      flex-shrink: 0;
    }
    .sidebar:hover .tab-key-hint { opacity: 0.6; }

    /* ── MOBILE TABS ── */
    .mobile-tabs {
      display: none;
      overflow-x: auto;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      gap: 6px;
      position: sticky;
      top: 53px;
      z-index: 150;
    }
    .mobile-tabs::-webkit-scrollbar { display: none; }

    .mobile-tab-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      white-space: nowrap;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 12px;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 500;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.18s;
    }
    .mobile-tab-btn.active         { background: var(--gold-dim);   border-color: var(--gold);     color: var(--gold); }
    .mobile-tab-btn.active.purple-tab { background: var(--purple-dim); border-color: var(--purple); color: var(--purple); }
    .mobile-tab-btn.active.pink-tab   { background: var(--pink-dim);   border-color: var(--pink);   color: var(--pink); }
    .mobile-tab-btn.active.green-tab  { background: var(--green-dim);  border-color: var(--green);  color: var(--green); }
    .mobile-tab-btn.active.orange-tab { background: var(--orange-dim); border-color: var(--orange); color: var(--orange); }
    .mobile-tab-btn.active.gray-tab   { background: var(--surface3);   border-color: var(--text-mid); color: var(--text-mid); }
    .mobile-tab-btn.active.blue-tab   { background: var(--blue-dim);   border-color: var(--blue);   color: var(--blue); }
    .mobile-tab-btn.active.teal-tab   { background: var(--teal-dim);   border-color: var(--teal);   color: var(--teal); }
    .mobile-badge { font-family: 'DM Mono', monospace; font-size: 10px; }

    /* ── MAIN AREA ── */
    .main-area { flex: 1; min-width: 0; padding: 24px 28px; overflow-y: auto; }

    /* ── STATS ── */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 22px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 15px 18px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      cursor: default;
    }
    .stat-card:hover { border-color: var(--border2); transform: translateY(-1px); }
    .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }
    .stat-card.blue-accent::after { background: linear-gradient(90deg, var(--blue), transparent); }
    .stat-card.teal-accent::after { background: linear-gradient(90deg, var(--teal), transparent); }
    .stat-card.purple-accent::after { background: linear-gradient(90deg, var(--purple), transparent); }

    .stat-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 6px; }
    .stat-value { font-family: 'Noto Serif KR', serif; font-size: 24px; font-weight: 700; color: var(--gold); line-height: 1; }
    .stat-value.blue   { color: var(--blue); }
    .stat-value.teal   { color: var(--teal); }
    .stat-value.purple { color: var(--purple); }
    .stat-sub { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); margin-top: 4px; }

    /* ── TOOLBAR ── */
    .toolbar { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }

    .search-wrap { position: relative; flex: 1; min-width: 180px; }
    .search-icon {
      position: absolute; left: 12px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted); pointer-events: none;
    }
    .search-clear {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      background: var(--surface3);
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      border-radius: 50%;
      width: 18px; height: 18px;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      line-height: 1;
      transition: all 0.15s;
    }
    .search-clear:hover { color: var(--text); background: var(--border2); }
    .search-clear.visible { display: flex; }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 34px 10px 36px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,0.08); }

    .search-kbd {
      position: absolute; right: 10px; top: 50%;
      transform: translateY(-50%);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 5px;
      pointer-events: none;
    }

    .toolbar-divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }

    .grade-filter { display: flex; gap: 4px; align-items: center; }
    .grade-filter-label { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 1.5px; color: var(--text-muted); text-transform: uppercase; }
    .grade-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 5px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .grade-btn:hover { border-color: var(--border2); color: var(--text); }
    .grade-btn.active-ALL { background: var(--gold-dim);              color: var(--gold);    border-color: rgba(201,168,76,0.5); }
    .grade-btn.active-A   { background: rgba(109,185,138,0.15);       color: var(--success); border-color: rgba(109,185,138,0.5); }
    .grade-btn.active-B   { background: rgba(201,168,76,0.15);        color: var(--warning); border-color: rgba(201,168,76,0.5); }
    .grade-btn.active-C   { background: rgba(201,122,109,0.15);       color: var(--danger);  border-color: rgba(201,122,109,0.5); }

    /* hide-empty toggle */
    .toggle-empty-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 11px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .toggle-empty-btn:hover { border-color: var(--border2); color: var(--text); }
    .toggle-empty-btn.active { background: var(--surface3); border-color: var(--border2); color: var(--text-mid); }

    /* ── RESULT ROW ── */
    .result-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; gap: 8px; flex-wrap: wrap; }
    .result-info { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); }
    .result-info strong { color: var(--gold); }

    .result-actions { display: flex; gap: 6px; }
    .expand-all-btn {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 12px;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .expand-all-btn:hover { border-color: var(--border2); color: var(--text); }

    /* ── ACCORDION CARDS ── */
    .reg-list, .jobgroup-list { display: flex; flex-direction: column; gap: 8px; }

    .reg-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .reg-card:hover { border-color: var(--border2); box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .reg-card.expanded         { border-color: var(--gold);     box-shadow: 0 0 0 1px rgba(201,168,76,0.1); }
    .reg-card.blue-card.expanded   { border-color: var(--blue);   box-shadow: 0 0 0 1px rgba(122,159,201,0.1); }
    .reg-card.teal-card.expanded   { border-color: var(--teal);   box-shadow: 0 0 0 1px rgba(109,185,176,0.1); }
    .reg-card.purple-card.expanded { border-color: var(--purple); box-shadow: 0 0 0 1px rgba(168,122,201,0.1); }
    .reg-card.pink-card.expanded   { border-color: var(--pink);   box-shadow: 0 0 0 1px rgba(201,122,160,0.1); }
    .reg-card.green-card.expanded  { border-color: var(--green);  box-shadow: 0 0 0 1px rgba(122,201,160,0.1); }
    .reg-card.orange-card.expanded { border-color: var(--orange); box-shadow: 0 0 0 1px rgba(201,160,122,0.1); }
    .reg-card.gray-card.expanded   { border-color: var(--text-mid); }

    .reg-card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .reg-card-header:hover { background: rgba(255,255,255,0.02); }

    .reg-num { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); width: 22px; flex-shrink: 0; }
    .reg-title { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 700; color: var(--text); flex: 1; }
    .reg-count-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text-muted);
      border-radius: 6px;
      padding: 3px 8px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .reg-card.expanded .reg-count-badge         { border-color: var(--gold);     color: var(--gold);     background: var(--gold-dim); }
    .reg-card.blue-card.expanded   .reg-count-badge { border-color: var(--blue);   color: var(--blue);   background: var(--blue-dim); }
    .reg-card.teal-card.expanded   .reg-count-badge { border-color: var(--teal);   color: var(--teal);   background: var(--teal-dim); }
    .reg-card.purple-card.expanded .reg-count-badge { border-color: var(--purple); color: var(--purple); background: var(--purple-dim); }
    .reg-card.pink-card.expanded   .reg-count-badge { border-color: var(--pink);   color: var(--pink);   background: var(--pink-dim); }
    .reg-card.green-card.expanded  .reg-count-badge { border-color: var(--green);  color: var(--green);  background: var(--green-dim); }
    .reg-card.orange-card.expanded .reg-count-badge { border-color: var(--orange); color: var(--orange); background: var(--orange-dim); }
    .reg-card.gray-card.expanded   .reg-count-badge { border-color: var(--text-mid); color: var(--text-mid); background: var(--surface3); }

    .toggle-arrow {
      width: 18px; height: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: transform 0.25s cubic-bezier(0.4,0,0.2,1);
      color: var(--text-muted);
    }
    .reg-card.expanded .toggle-arrow,
    .jg-card.expanded  .toggle-arrow { transform: rotate(180deg); }

    .reg-card-body { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1); }
    .reg-card-body-inner { padding: 0 16px 16px; border-top: 1px solid var(--border); }

    /* ── JOB GROUP CARDS ── */
    .jg-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .jg-card:hover { border-color: var(--border2); box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
    .jg-card.expanded { border-color: var(--gold); }

    .jg-card-header {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 16px; cursor: pointer; user-select: none;
      transition: background 0.15s;
    }
    .jg-card-header:hover { background: rgba(255,255,255,0.02); }

    .jg-num  { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text-muted); width: 22px; flex-shrink: 0; }
    .jg-name { font-family: 'Noto Serif KR', serif; font-size: 14px; font-weight: 700; color: var(--text); flex: 1; }
    .jg-count {
      font-family: 'DM Mono', monospace; font-size: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 6px;
      padding: 3px 8px; white-space: nowrap; flex-shrink: 0;
    }
    .jg-card.expanded .jg-count { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }

    .jg-card-body { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1); }
    .jg-card-body-inner { padding: 0 16px 16px; border-top: 1px solid var(--border); }

    .jg-reg-group { margin-top: 14px; }
    .jg-reg-title {
      font-size: 12px; font-weight: 700; color: var(--gold);
      margin-bottom: 8px; padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      font-family: 'Noto Serif KR', serif;
    }

    /* ── ITEM CARDS ── */
    .item-list { display: flex; flex-direction: column; gap: 8px; margin-top: 12px; }

    .item-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.15s;
    }
    .item-card:hover { border-color: var(--border2); }

    .item-card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: var(--surface3);
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
      transition: background 0.15s;
    }
    .item-card-header:hover { background: rgba(255,255,255,0.02); }
    .item-card-header-right { margin-left: auto; display: flex; align-items: center; gap: 6px; }

    .item-idx { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text-muted); }
    .grade-badge {
      font-family: 'DM Mono', monospace;
      font-size: 10px; font-weight: 500;
      padding: 2px 7px; border-radius: 4px;
    }
    .grade-A { background: rgba(109,185,138,0.15); color: var(--success); border: 1px solid rgba(109,185,138,0.3); }
    .grade-B { background: rgba(201,168,76,0.15);  color: var(--warning); border: 1px solid rgba(201,168,76,0.3); }
    .grade-C { background: rgba(201,122,109,0.15); color: var(--danger);  border: 1px solid rgba(201,122,109,0.3); }
    .grade-default { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }

    .item-division { font-size: 11px; color: var(--text-muted); }

    .item-toggle-arrow {
      width: 14px; height: 14px;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-muted); flex-shrink: 0;
      transition: transform 0.2s;
    }
    .item-card.open .item-toggle-arrow { transform: rotate(180deg); }

    .item-card-body { max-height: 0; overflow: hidden; transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1); }
    .item-card.open .item-card-body { max-height: 2000px; }

    .field-rows { padding: 10px 12px; display: flex; flex-direction: column; }
    .field-row {
      display: grid;
      grid-template-columns: 88px 1fr;
      gap: 0;
      border-bottom: 1px solid var(--border);
      min-height: 32px;
    }
    .field-row:last-child { border-bottom: none; }
    .field-row.hidden-empty { display: none; }

    .field-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      padding: 7px 10px 7px 0;
      border-right: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      text-transform: uppercase;
    }
    .field-value {
      font-size: 12px;
      color: var(--text);
      padding: 7px 0 7px 12px;
      line-height: 1.65;
      word-break: break-word;
    }
    .field-value.empty { color: var(--text-muted); font-style: italic; }

    /* search highlight */
    mark.hl {
      background: rgba(201,168,76,0.3);
      color: var(--gold2);
      border-radius: 2px;
      padding: 0 1px;
    }

    /* ── LOADING / ERROR ── */
    .loading-screen, .error-screen {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 60vh; gap: 16px; text-align: center;
    }
    .spinner {
      width: 34px; height: 34px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text-muted); font-size: 11px; font-family: 'DM Mono', monospace; letter-spacing: 1.5px; }

    .error-box {
      background: rgba(201,122,109,0.08);
      border: 1px solid rgba(201,122,109,0.3);
      border-radius: 12px;
      padding: 24px 32px;
      color: var(--danger);
      font-size: 13px;
      max-width: 480px;
      line-height: 1.7;
    }
    .empty-state {
      text-align: center; padding: 48px;
      color: var(--text-muted); font-size: 12px;
      font-family: 'DM Mono', monospace; letter-spacing: 0.5px;
    }

    /* ── KEYBOARD SHORTCUT TOAST ── */
    .kbd-toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--surface3);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 12px 16px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      z-index: 500;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 0.2s, transform 0.2s;
      pointer-events: none;
      min-width: 200px;
    }
    .kbd-toast.visible { opacity: 1; transform: translateY(0); }
    .kbd-toast-title { color: var(--text-mid); margin-bottom: 8px; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }
    .kbd-row { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
    .kbd-key {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: 4px;
      padding: 2px 6px;
      font-size: 10px;
      color: var(--text-mid);
      min-width: 22px;
      text-align: center;
    }
    .kbd-desc { color: var(--text-muted); font-size: 10px; }

    /* ── PRINT STYLES ── */
    @media print {
      #scrollBar, header .hdr-btn, .sidebar, .mobile-tabs,
      .toolbar, .result-row, .toggle-arrow, .item-toggle-arrow,
      .stats-bar { display: none !important; }
      body { background: #fff !important; color: #000 !important; }
      .main-area { padding: 0 !important; }
      .reg-card, .item-card { border: 1px solid #ccc !important; break-inside: avoid; }
      .reg-card-body { max-height: none !important; }
      .item-card-body { max-height: none !important; }
      .reg-card-body-inner { display: block !important; }
      .field-label { color: #666 !important; }
      .field-value { color: #000 !important; }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 900px) {
      :root { --sidebar-w: 200px; }
    }
    @media (max-width: 768px) {
      .sidebar { display: none !important; }
      .mobile-tabs { display: flex !important; }
      .main-area { padding: 14px 16px; }
      .stats-bar { grid-template-columns: repeat(2, 1fr); }
      .field-row { grid-template-columns: 68px 1fr; }
      .grade-filter-label, .toolbar-divider { display: none; }
      .header-status .status-text { display: none; }
      .hdr-btn .btn-label { display: none; }
    }
    @media (min-width: 769px) {
      .mobile-tabs { display: none !important; }
      .sidebar { display: flex !important; }
    }
  </style>
</head>

<script>
(function () {
  'use strict';

  const SPREADSHEET_ID = '18dDgxsczklu9FRm053w2rqLDFDjqm7C18rijuyJdrkI';
  const DIRECT_URL = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID + '/export?format=csv&gid=0';
  const PROXY_URL  = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(DIRECT_URL);

  const COL = {
    규정제목: 0, 직군: 1, 조사항목등급: 2, 조사항목구분: 3,
    조사항목장: 4, 기준제목: 5, 기준: 6, 조사항목: 7,
    기준이해: 8, 조사내용: 9, 조사목적: 10, 참고자료: 11,
  };

  const JOB_TABS   = { doctor:'의사', nurse:'간호사', pharm:'약사', guardian:'보호자' };
  const SPECIAL_JOBS = Object.values(JOB_TABS);
  const ALL_VIEWS  = ['all','jobgroup','doctor','nurse','pharm','guardian','etc','question','review'];

  let allRows     = [];
  let currentView = 'all';
  let searchQuery = '';
  let gradeFilter = '';
  let allExpanded = false;
  let hideEmpty   = false;

  /* ── utils ── */
  function norm(s) {
    if (!s) return '';
    return s.replace(/\ufeff/g,'').replace(/\u00a0/g,' ').replace(/\u3000/g,' ').trim().toLowerCase();
  }
  function esc(str) {
    if (!str) return '-';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
  function el(id) { return document.getElementById(id); }
  function setText(id, v) { var e = el(id); if (e) e.textContent = v; }
  function pad(n) { return String(n).padStart(2,'0'); }

  /* highlight search terms in text */
  function highlight(str, q) {
    if (!q || !str) return esc(str);
    var safe = esc(str);
    var safeQ = q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
    return safe.replace(new RegExp('(' + safeQ + ')', 'gi'), '<mark class="hl">$1</mark>');
  }

  /* ── CSV parser ── */
  function parseCSV(text) {
    var lines = [], cur = '', inQ = false, row = [];
    for (var i = 0; i < text.length; i++) {
      var ch = text[i];
      if (ch === '"') {
        if (inQ && text[i+1] === '"') { cur += '"'; i++; }
        else { inQ = !inQ; }
      } else if (ch === ',' && !inQ) {
        row.push(cur.trim()); cur = '';
      } else if ((ch === '\n' || ch === '\r') && !inQ) {
        if (ch === '\r' && text[i+1] === '\n') i++;
        row.push(cur.trim()); cur = '';
        lines.push(row); row = [];
      } else { cur += ch; }
    }
    if (cur !== '' || row.length) { row.push(cur.trim()); lines.push(row); }
    return lines;
  }

  /* ── classifiers ── */
  function isQuestion(r) { return norm(r[COL.규정제목]).indexOf('질문') !== -1; }
  function isReview(r)   {
    var v = norm(r[COL.직군]);
    return v.indexOf('규정검토') !== -1 || v.indexOf('규정 검토') !== -1;
  }
  function isDoctor(r)   { return !isQuestion(r) && !isReview(r) && norm(r[COL.직군]).indexOf(norm(JOB_TABS.doctor))   !== -1; }
  function isNurse(r)    { return !isQuestion(r) && !isReview(r) && norm(r[COL.직군]).indexOf(norm(JOB_TABS.nurse))    !== -1; }
  function isPharm(r)    { return !isQuestion(r) && !isReview(r) && norm(r[COL.직군]).indexOf(norm(JOB_TABS.pharm))    !== -1; }
  function isGuardian(r) { return !isQuestion(r) && !isReview(r) && norm(r[COL.직군]).indexOf(norm(JOB_TABS.guardian)) !== -1; }
  function isEtc(r) {
    if (isQuestion(r) || isReview(r)) return false;
    var v = norm(r[COL.직군]);
    for (var i = 0; i < SPECIAL_JOBS.length; i++) {
      if (v.indexOf(norm(SPECIAL_JOBS[i])) !== -1) return false;
    }
    return true;
  }
  function isGeneral(r) { return !isQuestion(r) && !isReview(r); }

  /* ── load ── */
  async function loadData() {
    var text = null;
    try { var r1 = await fetch(DIRECT_URL); if (r1.ok) text = await r1.text(); } catch(_) {}
    if (!text) {
      try { var r2 = await fetch(PROXY_URL); if (r2.ok) text = await r2.text(); }
      catch(e) { showError('네트워크 오류: ' + e.message); return; }
    }
    if (!text) { showError('데이터를 불러오지 못했습니다.'); return; }

    var rows = parseCSV(text);
    if (rows.length < 2) { showError('시트에 데이터가 없습니다.'); return; }
    allRows = rows.slice(1).filter(function(r) { return r.some(function(c) { return c !== ''; }); });
    if (!allRows.length) { showError('유효한 데이터 행이 없습니다.'); return; }

    updateBadges();
    el('statusDot').style.background = '#6db98a';
    el('statusDot').style.animation  = 'none';
    setText('statusText', allRows.length + '개 항목 로드 완료');
    el('loadingScreen').style.display = 'none';
    el('mainContent').style.display   = 'block';

    /* restore tab from hash */
    var hash = location.hash.replace('#','');
    if (ALL_VIEWS.indexOf(hash) !== -1) { switchTab(hash, true); }
    rerender();
  }

  function showError(msg) {
    el('loadingScreen').style.display = 'none';
    el('errorScreen').style.display   = 'flex';
    el('errorMsg').innerHTML = '<strong>데이터를 불러오지 못했습니다.</strong><br/><br/>' + msg;
    el('statusDot').style.background = '#c97a6d';
    setText('statusText', '로드 실패');
  }

  /* ── badges ── */
  function updateBadges() {
    var genRows = allRows.filter(isGeneral);
    var qRows   = allRows.filter(isQuestion);
    var rvRows  = allRows.filter(isReview);
    var drRows  = allRows.filter(isDoctor);
    var nuRows  = allRows.filter(isNurse);
    var phRows  = allRows.filter(isPharm);
    var guRows  = allRows.filter(isGuardian);
    var etRows  = allRows.filter(isEtc);

    var regSet = new Set(genRows.map(function(r) { return r[COL.규정제목]; }).filter(Boolean));
    var grpSet = new Set(genRows.map(function(r) { return r[COL.직군]; }).filter(Boolean));

    var aCount = allRows.filter(function(r) { return (r[COL.조사항목등급]||'').toUpperCase()==='A'; }).length;
    var bCount = allRows.filter(function(r) { return (r[COL.조사항목등급]||'').toUpperCase()==='B'; }).length;
    var cCount = allRows.filter(function(r) { return (r[COL.조사항목등급]||'').toUpperCase()==='C'; }).length;

    setText('statTotal',     allRows.length.toLocaleString());
    setText('statRegs',      regSet.size.toLocaleString());
    setText('statQuestions', qRows.length.toLocaleString());
    setText('statReviews',   rvRows.length.toLocaleString());
    setText('statGrades',    'A:'+aCount+' B:'+bCount+' C:'+cCount);
    setText('statGroups',    '직군 ' + grpSet.size + '개');

    var counts = {
      all: regSet.size, jobgroup: grpSet.size,
      doctor: drRows.length, nurse: nuRows.length,
      pharm: phRows.length, guardian: guRows.length,
      etc: etRows.length, question: qRows.length, review: rvRows.length,
    };
    Object.keys(counts).forEach(function(k) {
      setText('sb-' + k, counts[k]);
      setText('mb-' + k, counts[k]);
    });
  }

  /* ── filter helper ── */
  function getFiltered(filterFn) {
    var rows = allRows.filter(filterFn);
    if (gradeFilter) {
      rows = rows.filter(function(r) { return (r[COL.조사항목등급]||'').toUpperCase() === gradeFilter; });
    }
    if (searchQuery) {
      var q = searchQuery.toLowerCase();
      rows = rows.filter(function(r) {
        return (r[COL.규정제목]||'').toLowerCase().indexOf(q) !== -1 ||
               (r[COL.기준제목]||'').toLowerCase().indexOf(q) !== -1 ||
               (r[COL.조사항목]||'').toLowerCase().indexOf(q) !== -1 ||
               (r[COL.직군]    ||'').toLowerCase().indexOf(q) !== -1 ||
               (r[COL.기준]    ||'').toLowerCase().indexOf(q) !== -1 ||
               (r[COL.기준이해]||'').toLowerCase().indexOf(q) !== -1;
      });
    }
    return rows;
  }

  /* ── item card html ── */
  function itemCardHtml(r, i) {
    var grade = (r[COL.조사항목등급]||'').toUpperCase();
    var gc = ['A','B','C'].indexOf(grade) !== -1 ? 'grade-' + grade : 'grade-default';
    var q = searchQuery;
    var fields = [
      { label: '직군',      val: r[COL.직군] },
      { label: '구분',      val: r[COL.조사항목구분] },
      { label: 'Chapter',   val: r[COL.조사항목장] },
      { label: '기준 제목', val: r[COL.기준제목] },
      { label: '기준',      val: r[COL.기준] },
      { label: '조사 항목', val: r[COL.조사항목] },
      { label: '기준 이해', val: r[COL.기준이해] },
      { label: '조사 내용', val: r[COL.조사내용] },
      { label: '조사 목적', val: r[COL.조사목적] },
      { label: '참고 자료', val: r[COL.참고자료] },
    ];
    var fieldHtml = fields.map(function(f) {
      var isEmpty = !f.val;
      var hideClass = (hideEmpty && isEmpty) ? ' hidden-empty' : '';
      return '<div class="field-row' + hideClass + '">' +
        '<div class="field-label">' + f.label + '</div>' +
        '<div class="field-value' + (isEmpty ? ' empty' : '') + '">' +
          (isEmpty ? '-' : highlight(f.val, q)) +
        '</div></div>';
    }).join('');

    return '<div class="item-card">' +
      '<div class="item-card-header" onclick="this.closest(\'.item-card\').classList.toggle(\'open\'); var b=this.nextElementSibling; b.style.maxHeight=this.closest(\'.item-card\').classList.contains(\'open\')?(b.scrollHeight+\'px\'):\'0\';">' +
        '<span class="item-idx">#' + pad(i+1) + '</span>' +
        '<span class="grade-badge ' + gc + '">' + (esc(grade)||'-') + '</span>' +
        '<span class="item-division">' + esc(r[COL.조사항목구분]) + '</span>' +
        '<div class="item-card-header-right">' +
          '<span class="item-toggle-arrow"><svg viewBox="0 0 24 24" width="10" height="10" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>' +
        '</div>' +
      '</div>' +
      '<div class="item-card-body" style="max-height:0;overflow:hidden;transition:max-height 0.35s cubic-bezier(0.4,0,0.2,1);">' +
        '<div class="field-rows">' + fieldHtml + '</div>' +
      '</div></div>';
  }

  /* ── accordion render ── */
  function renderAccordion(containerId, rows, cardClass) {
    var container = el(containerId);
    container.innerHTML = '';
    if (!rows.length) {
      container.innerHTML = '<div class="empty-state">표시할 데이터가 없습니다.</div>';
      if (currentView !== 'jobgroup') updateResultInfo(0);
      return;
    }
    var order = [], groups = {};
    rows.forEach(function(r) {
      var t = r[COL.규정제목] || '(제목 없음)';
      if (!groups[t]) { groups[t] = []; order.push(t); }
      groups[t].push(r);
    });
    if (currentView !== 'jobgroup') updateResultInfo(order.length);

    order.forEach(function(title, idx) {
      var rowSet = groups[title];
      var card = document.createElement('div');
      card.className = 'reg-card' + (cardClass ? ' '+cardClass : '');
      var titleHtml = searchQuery ? highlight(title, searchQuery) : esc(title);
      card.innerHTML =
        '<div class="reg-card-header">' +
          '<span class="reg-num">' + pad(idx+1) + '</span>' +
          '<span class="reg-title">' + titleHtml + '</span>' +
          '<span class="reg-count-badge">' + rowSet.length + ' 항목</span>' +
          '<span class="toggle-arrow"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>' +
        '</div>' +
        '<div class="reg-card-body"><div class="reg-card-body-inner"><div class="item-list">' +
          rowSet.map(function(r,i) { return itemCardHtml(r,i); }).join('') +
        '</div></div></div>';
      card.querySelector('.reg-card-header').addEventListener('click', function() { toggleCard(card); });
      container.appendChild(card);
    });
  }

  /* ── job group render ── */
  function renderJobGroup() {
    var container = el('jobgroupList');
    container.innerHTML = '';
    var filtered = getFiltered(isGeneral);
    if (!filtered.length) { container.innerHTML = '<div class="empty-state">표시할 데이터가 없습니다.</div>'; return; }

    var order = [], byGroup = {};
    filtered.forEach(function(r) {
      var g = r[COL.직군] || '(직군 없음)';
      if (!byGroup[g]) { byGroup[g] = []; order.push(g); }
      byGroup[g].push(r);
    });
    order.sort(function(a,b) { return a.localeCompare(b); });

    order.forEach(function(group, idx) {
      var rows = byGroup[group];
      var regOrder = [], byReg = {};
      rows.forEach(function(r) {
        var t = r[COL.규정제목] || '(제목 없음)';
        if (!byReg[t]) { byReg[t] = []; regOrder.push(t); }
        byReg[t].push(r);
      });
      var card = document.createElement('div');
      card.className = 'jg-card';
      card.innerHTML =
        '<div class="jg-card-header">' +
          '<span class="jg-num">' + pad(idx+1) + '</span>' +
          '<span class="jg-name">' + esc(group) + '</span>' +
          '<span class="jg-count">' + rows.length + ' 항목</span>' +
          '<span class="toggle-arrow"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>' +
        '</div>' +
        '<div class="jg-card-body"><div class="jg-card-body-inner">' +
          regOrder.map(function(rt) {
            return '<div class="jg-reg-group"><div class="jg-reg-title">' + esc(rt) + '</div>' +
              '<div class="item-list">' + byReg[rt].map(function(r,i) { return itemCardHtml(r,i); }).join('') + '</div></div>';
          }).join('') +
        '</div></div>';
      card.querySelector('.jg-card-header').addEventListener('click', function() { toggleCard(card); });
      container.appendChild(card);
    });
  }

  /* ── toggle single card ── */
  function toggleCard(card) {
    var body  = card.querySelector('.reg-card-body, .jg-card-body');
    var inner = card.querySelector('.reg-card-body-inner, .jg-card-body-inner');
    if (card.classList.contains('expanded')) {
      body.style.maxHeight = '0';
      card.classList.remove('expanded');
    } else {
      card.classList.add('expanded');
      body.style.maxHeight = (inner.scrollHeight + 9999) + 'px';
    }
  }

  /* ── switch tab ── */
  function switchTab(tab, noHash) {
    currentView = tab;
    if (!noHash) location.hash = tab;
    document.querySelectorAll('.tab-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.tab === tab);
    });
    document.querySelectorAll('.mobile-tab-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.tab === tab);
    });
    ALL_VIEWS.forEach(function(v) {
      var ve = el('view-' + v);
      if (ve) ve.style.display = v === tab ? 'block' : 'none';
    });
    allExpanded = false;
    setText('expandAllBtn', '모두 펼치기');
  }

  /* ── expand all ── */
  function toggleExpandAll() {
    allExpanded = !allExpanded;
    setText('expandAllBtn', allExpanded ? '모두 접기' : '모두 펼치기');
    var listMap = {
      all:'regList', jobgroup:'jobgroupList', doctor:'doctorList', nurse:'nurseList',
      pharm:'pharmList', guardian:'guardianList', etc:'etcList', question:'questionList', review:'reviewList',
    };
    var container = el(listMap[currentView]);
    if (!container) return;
    container.querySelectorAll('.reg-card, .jg-card').forEach(function(card) {
      var body  = card.querySelector('.reg-card-body, .jg-card-body');
      var inner = card.querySelector('.reg-card-body-inner, .jg-card-body-inner');
      if (allExpanded) {
        card.classList.add('expanded');
        body.style.maxHeight = (inner.scrollHeight + 9999) + 'px';
      } else {
        card.classList.remove('expanded');
        body.style.maxHeight = '0';
      }
    });
  }

  /* ── rerender ── */
  function rerender() {
    allExpanded = false;
    setText('expandAllBtn', '모두 펼치기');
    renderAccordion('regList',      getFiltered(isGeneral),  '');
    renderAccordion('doctorList',   getFiltered(isDoctor),   'purple-card');
    renderAccordion('nurseList',    getFiltered(isNurse),    'pink-card');
    renderAccordion('pharmList',    getFiltered(isPharm),    'green-card');
    renderAccordion('guardianList', getFiltered(isGuardian), 'orange-card');
    renderAccordion('etcList',      getFiltered(isEtc),      'gray-card');
    renderAccordion('questionList', getFiltered(isQuestion), 'blue-card');
    renderAccordion('reviewList',   getFiltered(isReview),   'teal-card');
    renderJobGroup();
  }

  /* ── result info ── */
  function updateResultInfo(count) {
    var ie = el('resultInfo');
    if (!ie) return;
    if (searchQuery || gradeFilter) {
      ie.innerHTML = '<strong>' + count + '</strong> 규정 검색됨';
    } else {
      ie.innerHTML = '<strong>' + count + '</strong> 규정';
    }
  }

  /* ── grade filter ── */
  function setGradeFilter(g) {
    gradeFilter = g;
    document.querySelectorAll('.grade-btn').forEach(function(b) { b.className = 'grade-btn'; });
    var key = g === '' ? 'ALL' : g;
    document.querySelectorAll('.grade-btn').forEach(function(b) {
      if (b.dataset.grade === g) b.classList.add('active-' + key);
    });
    rerender();
  }

  /* ── scroll progress bar ── */
  var scrollBar = el('scrollBar');
  var mainArea  = el('mainArea');
  if (mainArea) {
    mainArea.addEventListener('scroll', function() {
      var max = mainArea.scrollHeight - mainArea.clientHeight;
      var pct = max > 0 ? (mainArea.scrollTop / max * 100) : 0;
      scrollBar.style.width = pct + '%';
    });
  }

  /* ── kbd toast ── */
  var kbdToast = el('kbdToast');
  var kbdTimer = null;
  function showKbdToast() {
    kbdToast.classList.add('visible');
    clearTimeout(kbdTimer);
    kbdTimer = setTimeout(function() { kbdToast.classList.remove('visible'); }, 4000);
  }
  el('kbdHelpBtn').addEventListener('click', showKbdToast);

  /* ── keyboard shortcuts ── */
  document.addEventListener('keydown', function(e) {
    var tag = document.activeElement.tagName;
    if (tag === 'INPUT' || tag === 'TEXTAREA') {
      if (e.key === 'Escape') {
        el('searchInput').value = '';
        searchQuery = '';
        el('searchClear').classList.remove('visible');
        el('searchInput').blur();
        rerender();
      }
      return;
    }
    if (e.key === '/') {
      e.preventDefault();
      el('searchInput').focus();
      el('searchInput').select();
    } else if (e.key === 'e' || e.key === 'E') {
      toggleExpandAll();
    } else if (e.key === 'h' || e.key === 'H') {
      el('toggleEmptyBtn').click();
    } else if (e.key === 'p' || e.key === 'P') {
      window.print();
    }
  });

  /* ── events ── */
  el('searchInput').addEventListener('input', function(e) {
    searchQuery = e.target.value;
    var clearBtn = el('searchClear');
    clearBtn.classList.toggle('visible', searchQuery.length > 0);
    rerender();
  });

  el('searchClear').addEventListener('click', function() {
    el('searchInput').value = '';
    searchQuery = '';
    this.classList.remove('visible');
    el('searchInput').focus();
    rerender();
  });

  el('expandAllBtn').addEventListener('click', toggleExpandAll);

  el('printBtn').addEventListener('click', function() { window.print(); });

  el('toggleEmptyBtn').addEventListener('click', function() {
    hideEmpty = !hideEmpty;
    this.classList.toggle('active', hideEmpty);
    this.textContent = hideEmpty ? '빈 필드 보이기' : '빈 필드 숨기기';
    rerender();
  });

  document.querySelectorAll('.tab-btn, .mobile-tab-btn').forEach(function(b) {
    b.addEventListener('click', function() { switchTab(b.dataset.tab); rerender(); });
  });

  document.querySelectorAll('.grade-btn').forEach(function(b) {
    b.addEventListener('click', function() { setGradeFilter(b.dataset.grade); });
  });

  /* ── start ── */
  loadData();
})();
</script>
</body>
</html>
