<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>한서재활요양병원 규정 뷰어</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap');

  :root {
    --bg: #1a1612;
    --bg2: #221e19;
    --bg3: #2c2620;
    --bg4: #342e27;
    --border: #3d3630;
    --gold: #c8a96e;
    --gold2: #e8c98e;
    --text: #e8ddd0;
    --text2: #a89880;
    --text3: #6e6055;
    --doctor: #7eb8d4;
    --nurse: #a8d4a0;
    --pharm: #d4a8c0;
    --guardian: #d4c4a0;
    --etc: #b0b8d4;
    --question: #d4b8a0;
    --red: #d47070;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  #topbar {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo-badge {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .logo-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--gold);
  }
  .topbar-right { display: flex; align-items: center; gap: 12px; }
  #status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--text3);
    display: inline-block;
    transition: background 0.3s;
    flex-shrink: 0;
  }
  #status-dot.ok { background: #6dbe6d; }
  #status-dot.err { background: var(--red); }
  #status-text { font-size: 12px; color: var(--text2); }
  .print-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 5px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-family: inherit;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .print-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* ★ debug-bar 완전 숨김 */
  #debug-bar { display: none !important; }

  .layout { display: flex; min-height: calc(100vh - 53px); }

  .sidebar {
    width: 200px;
    flex-shrink: 0;
    background: var(--bg2);
    border-right: 1px solid var(--border);
    padding: 20px 0;
    position: sticky;
    top: 53px;
    height: calc(100vh - 53px);
    overflow-y: auto;
  }
  .sidebar-section {
    padding: 0 16px 8px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-top: 16px;
  }
  .sidebar-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 7px 16px;
    cursor: pointer;
    border-left: 3px solid transparent;
    transition: all 0.15s;
    color: var(--text2);
    font-size: 13px;
  }
  .sidebar-item:hover { background: var(--bg3); color: var(--text); }
  .sidebar-item.active {
    background: var(--bg3);
    border-left-color: var(--gold);
    color: var(--gold);
    font-weight: 500;
  }
  .sidebar-badge {
    background: var(--bg4);
    color: var(--text3);
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
  }
  .sidebar-item.active .sidebar-badge { background: var(--gold); color: var(--bg); }
  .sidebar-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    display: inline-block;
    margin-right: 8px;
    flex-shrink: 0;
  }

  .main { flex: 1; padding: 24px; overflow-x: hidden; min-width: 0; }

  .search-wrap { position: relative; margin-bottom: 20px; }
  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text3);
    font-size: 14px;
    pointer-events: none;
  }
  #search-input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px 10px 40px;
    color: var(--text);
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  #search-input:focus { border-color: var(--gold); }
  #search-input::placeholder { color: var(--text3); }

  /* ★ stat-grid: 데스크탑만 표시 */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .stat-card:hover { border-color: var(--gold); transform: translateY(-1px); }
  .stat-card.active { border-color: var(--gold); background: var(--bg3); }
  .stat-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: transparent;
    transition: background 0.2s;
  }
  .stat-card.active::before,
  .stat-card:hover::before { background: var(--gold); }
  .stat-label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text3);
    margin-bottom: 6px;
  }
  .stat-num { font-size: 28px; font-weight: 700; color: var(--gold2); line-height: 1; margin-bottom: 4px; }
  .stat-name { font-size: 12px; color: var(--text2); }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }
  .section-title { font-size: 13px; color: var(--text2); font-weight: 500; }
  .expand-all-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text3);
    padding: 4px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 11px;
    font-family: inherit;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .expand-all-btn:hover { border-color: var(--gold); color: var(--gold); }

  .reg-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .reg-card:hover { border-color: var(--bg4); }
  .reg-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
    gap: 12px;
  }
  .reg-card-left { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; }
  .reg-num {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    flex-shrink: 0;
    width: 24px;
  }
  .reg-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .reg-count-badge {
    background: var(--bg4);
    color: var(--text3);
    padding: 2px 9px;
    border-radius: 10px;
    font-size: 10px;
    font-family: 'IBM Plex Mono', monospace;
    flex-shrink: 0;
  }
  .reg-chevron {
    color: var(--text3);
    font-size: 10px;
    transition: transform 0.25s;
    flex-shrink: 0;
    pointer-events: none;
  }
  .reg-card.open .reg-chevron { transform: rotate(180deg); }
  .reg-card-body {
    display: none;
    padding: 0 18px 14px;
  }
  .reg-card.open .reg-card-body { display: block; }

  .item-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 8px;
    overflow: hidden;
  }
  .item-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    cursor: pointer;
    user-select: none;
    gap: 10px;
  }
  .item-header-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }
  .item-seq {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--text3);
    flex-shrink: 0;
    width: 28px;
  }
  .grade-badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 10px;
    font-weight: 700;
    flex-shrink: 0;
    font-family: 'IBM Plex Mono', monospace;
  }
  .grade-P { background: #3a1a1a; color: var(--red); border: 1px solid #5a2a2a; }
  .grade-S { background: #1a2a3a; color: var(--doctor); border: 1px solid #2a3a5a; }
  .grade-M { background: #1a3a2a; color: var(--nurse); border: 1px solid #2a5a3a; }
  .grade-default { background: var(--bg4); color: var(--text3); border: 1px solid var(--border); }
  .item-criterion-title {
    font-size: 13px;
    color: var(--text);
    flex: 1;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .item-chevron {
    color: var(--text3);
    font-size: 9px;
    transition: transform 0.2s;
    flex-shrink: 0;
    pointer-events: none;
  }
  .item-card.open .item-chevron { transform: rotate(180deg); }
  .item-body {
    display: none;
    padding: 0 14px 12px;
  }
  .item-card.open .item-body { display: block; }

  .field-rows { display: flex; flex-direction: column; gap: 6px; }
  .field-row {
    display: grid;
    grid-template-columns: 130px 1fr;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .field-key {
    background: var(--bg4);
    padding: 7px 10px;
    font-size: 11px;
    color: var(--text3);
    font-weight: 500;
    display: flex;
    align-items: flex-start;
    border-right: 1px solid var(--border);
  }
  .field-val {
    background: var(--bg2);
    padding: 7px 12px;
    font-size: 12px;
    color: var(--text);
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .field-val.empty { color: var(--text3); font-style: italic; }

  .jg-tag {
    padding: 2px 8px;
    border-radius: 12px;
    font-size: 10px;
    font-weight: 500;
    border: 1px solid;
  }
  .jg-doctor { background: #1a2a3a; color: var(--doctor); border-color: #2a4a5a; }
  .jg-nurse  { background: #1a3020; color: var(--nurse);  border-color: #2a5030; }
  .jg-pharm  { background: #2a1a28; color: var(--pharm);  border-color: #4a2a48; }
  .jg-guardian { background: #2a2418; color: var(--guardian); border-color: #4a4428; }
  .jg-etc    { background: #1a1e2a; color: var(--etc);    border-color: #2a2e4a; }
  .jg-question { background: #2a2018; color: var(--question); border-color: #4a4030; }

  .empty-msg { text-align: center; padding: 60px 20px; color: var(--text3); font-size: 14px; }
  .loading-msg { text-align: center; padding: 60px 20px; color: var(--text2); }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* =============================================
     MOBILE RESPONSIVE
     ============================================= */
  @media (max-width: 768px) {

    /* ★ 1번 빨간박스: stat-grid 완전 숨김 */
    .stat-grid { display: none !important; }

    /* ★ 2번 빨간박스: debug-bar 완전 숨김 (이미 위에서 처리) */

    /* topbar 모바일 최적화 */
    #topbar { padding: 10px 14px; }
    .logo-badge { display: none; }
    .logo-title { font-size: 14px; }
    #status-text { display: none; }

    /* 레이아웃: 사이드바 숨기고 상단 탭바로 변경 */
    .layout { flex-direction: column; }
    .sidebar {
      width: 100%;
      height: auto;
      position: static;
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 8px 0 0;
      display: flex;
      flex-direction: row;
      overflow-x: auto;
      overflow-y: hidden;
      gap: 0;
      -webkit-overflow-scrolling: touch;
    }
    .sidebar::-webkit-scrollbar { display: none; }
    .sidebar-section { display: none; }
    .sidebar-item {
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 8px 14px;
      border-left: none;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      flex-shrink: 0;
      gap: 4px;
      font-size: 12px;
    }
    .sidebar-item.active {
      border-left: none;
      border-bottom: 3px solid var(--gold);
      background: var(--bg3);
    }
    .sidebar-dot { display: none; }
    .sidebar-badge {
      font-size: 9px;
      padding: 1px 5px;
    }

    /* 메인 패딩 줄이기 */
    .main { padding: 14px; }

    /* field-row 모바일: 키/값 세로 배열 */
    .field-row {
      grid-template-columns: 1fr;
    }
    .field-key {
      border-right: none;
      border-bottom: 1px solid var(--border);
      padding: 5px 10px;
    }

    /* reg-card 직군 태그 줄바꿈 허용 */
    .reg-card-header { flex-wrap: wrap; }
    .reg-title { white-space: normal; }
  }

  @media print {
    .sidebar, #topbar, .search-wrap, .stat-grid, #debug-bar { display: none !important; }
    .main { padding: 0; }
    .reg-card-body, .item-body { display: block !important; }
  }
</style>
</head>
<body>

<div id="topbar">
  <div style="display:flex;align-items:center;gap:12px;">
    <div>
      <div class="logo-badge">REGULATION VIEWER V3</div>
      <div class="logo-title">한서재활요양병원 규정</div>
    </div>
  </div>
  <div class="topbar-right">
    <button class="print-btn" onclick="window.print()">인쇄</button>
    <span id="status-dot"></span>
    <span id="status-text">로딩중...</span>
  </div>
</div>

<div id="debug-bar"></div>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">기본 보기</div>
    <div class="sidebar-item active" data-tab="all">
      <span><span class="sidebar-dot" style="background:var(--gold)"></span>전체</span>
      <span class="sidebar-badge" id="sb-all">0</span>
    </div>
    <div class="sidebar-item" data-tab="review">
      <span><span class="sidebar-dot" style="background:#888"></span>규정 검토</span>
      <span class="sidebar-badge" id="sb-review">0</span>
    </div>
    <div class="sidebar-section">직군 분류</div>
    <div class="sidebar-item" data-tab="jg">
      <span><span class="sidebar-dot" style="background:var(--gold)"></span>직군별</span>
      <span class="sidebar-badge" id="sb-jg">0</span>
    </div>
    <div class="sidebar-item" data-tab="doctor">
      <span><span class="sidebar-dot" style="background:var(--doctor)"></span>의사</span>
      <span class="sidebar-badge" id="sb-doctor">0</span>
    </div>
    <div class="sidebar-item" data-tab="nurse">
      <span><span class="sidebar-dot" style="background:var(--nurse)"></span>간호사</span>
      <span class="sidebar-badge" id="sb-nurse">0</span>
    </div>
    <div class="sidebar-item" data-tab="pharm">
      <span><span class="sidebar-dot" style="background:var(--pharm)"></span>약사</span>
      <span class="sidebar-badge" id="sb-pharm">0</span>
    </div>
    <div class="sidebar-item" data-tab="guardian">
      <span><span class="sidebar-dot" style="background:var(--guardian)"></span>보호자</span>
      <span class="sidebar-badge" id="sb-guardian">0</span>
    </div>
    <div class="sidebar-item" data-tab="etc">
      <span><span class="sidebar-dot" style="background:var(--etc)"></span>기타</span>
      <span class="sidebar-badge" id="sb-etc">0</span>
    </div>
    <div class="sidebar-section">특수 분류</div>
    <div class="sidebar-item" data-tab="question">
      <span><span class="sidebar-dot" style="background:var(--question)"></span>질문</span>
      <span class="sidebar-badge" id="sb-question">0</span>
    </div>
  </div>

  <div class="main">
    <div class="search-wrap">
      <span class="search-icon">S</span>
      <input type="text" id="search-input" placeholder="규정 제목, 항목, 직군으로 검색... (단축키: /)" />
    </div>

    <!-- stat-grid: 데스크탑만 표시 -->
    <div class="stat-grid" id="stat-grid">
      <div class="stat-card active" data-tab="all">
        <div class="stat-label">ALL</div>
        <div class="stat-num" id="sc-all">0</div>
        <div class="stat-name">전체</div>
      </div>
      <div class="stat-card" data-tab="review">
        <div class="stat-label">REVIEW</div>
        <div class="stat-num" id="sc-review">0</div>
        <div class="stat-name">규정 검토</div>
      </div>
      <div class="stat-card" data-tab="jg">
        <div class="stat-label">JOB GROUP</div>
        <div class="stat-num" id="sc-jg">0</div>
        <div class="stat-name">직군별</div>
      </div>
      <div class="stat-card" data-tab="doctor">
        <div class="stat-label">DOCTOR</div>
        <div class="stat-num" id="sc-doctor">0</div>

      </div>
      <div class="stat-card" data-tab="nurse">

      <div class="stat-card" data-tab="pharm">
        <div class="stat-label">PHARMACIST</div>

      <div class="stat-card" data-tab="guardian">

        <div class="stat-num" id="sc-etc">0</div>
        <div class="stat-name">기타 직군</div>

      <div class="stat-card" data-tab="question">
        <div class="stat-label">QUESTION</div>
        <div class="stat-num" id="sc-question">0</div>
        <div class="stat-name">질문</div>

    <div id="content">
      <div class="loading-msg">
        <div class="spinner"></div>
        <div>구글 시트에서 데이터를 불러오는 중...</div>
      </div>
    </div>
  </div>
</div>

<script>
const SHEET_ID   = '18dDgxsczklu9FRm053w2rqLDFDjqm7C18rijuyJdrkI';
const SHEET_NAME = 'Sheet1';

const COL = {
  REG_TITLE:   0,
  JOB_GROUP:   1,
  GRADE:       2,
  CATEGORY:    3,
  CHAPTER:     4,
  CRIT_TITLE:  5,
  STANDARD:    6,
  SURVEY_ITEM: 7,
  CRIT_UNDER:  8,
  SURVEY_CONT: 9,
  SURVEY_OBJ:  10,
  REFERENCE:   11
};

const FIELD_LABELS = [
  { key: COL.GRADE,       label: '등급' },
  { key: COL.CATEGORY,    label: '조사항목 구분' },
  { key: COL.CHAPTER,     label: '조사항목 장' },
  { key: COL.CRIT_TITLE,  label: '기준 제목' },
  { key: COL.STANDARD,    label: '기준(Standard)' },
  { key: COL.SURVEY_ITEM, label: '조사 항목' },
  { key: COL.CRIT_UNDER,  label: '기준 이해' },
  { key: COL.SURVEY_CONT, label: '조사 내용' },
  { key: COL.SURVEY_OBJ,  label: '조사 목적' },
  { key: COL.REFERENCE,   label: '참고자료' }
];

let allRows    = [];
let currentTab = 'all';

// =============================================
// FETCH
// =============================================
async function fetchSheet() {
  try {
    await fetchViaCsv();
  } catch(e1) {
    try {
      await fetchViaGviz();
    } catch(e2) {
      showError('데이터 로드 실패. 시트 공유 설정을 확인해주세요.');
    }
  }
}

async function fetchViaCsv() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&sheet=${encodeURIComponent(SHEET_NAME)}&t=${Date.now()}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();
  if (text.trim().startsWith('<!')) throw new Error('로그인 페이지 반환 (시트 비공개)');
  const rows = parseCsv(text);
  processRows(rows, 'csv');
}

async function fetchViaGviz() {
  const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${encodeURIComponent(SHEET_NAME)}&t=${Date.now()}`;
  const res  = await fetch(url);
  if (!res.ok) throw new Error('HTTP ' + res.status);
  const text = await res.text();

  let jsonStr = null;
  const patterns = [
    /google\.visualization\.Query\.setResponse\(([\s\S]*?)\);?\s*$/,
    /setResponse\(([\s\S]*?)\);?\s*$/,
    /\(([\s\S]*)\)/
  ];
  for (const p of patterns) {
    const m = text.match(p);
    if (m) { jsonStr = m[1]; break; }
  }
  if (!jsonStr) throw new Error('gviz 응답 파싱 실패');

  const json = JSON.parse(jsonStr);
  const tbl  = json.table;
  if (!tbl || !tbl.rows) throw new Error('table.rows 없음');

  const parsed = tbl.rows
    .filter(row => row !== null && row !== undefined)
    .map(row =>
      (tbl.cols || []).map((col, i) => {
        const cell = row.c ? row.c[i] : null;
        if (!cell || cell.v === null || cell.v === undefined) return '';
        return String(cell.v).trim();
      })
    );
  processRows(parsed, 'gviz');
}

function parseCsv(text) {
  const result = [];
  let cur = '', inQ = false, row = [];
  for (let i = 0; i < text.length; i++) {
    const ch = text[i];
    if (ch === '"') {
      if (inQ && text[i+1] === '"') { cur += '"'; i++; }
      else inQ = !inQ;
    } else if (ch === ',' && !inQ) {
      row.push(cur.trim()); cur = '';
    } else if ((ch === '\n' || ch === '\r') && !inQ) {
      if (ch === '\r' && text[i+1] === '\n') i++;
      row.push(cur.trim()); cur = '';
      if (row.some(v => v !== '')) result.push(row);
      row = [];
    } else {
      cur += ch;
    }
  }
  if (cur || row.length) { row.push(cur.trim()); if (row.some(v => v !== '')) result.push(row); }
  return result;
}

function processRows(rows, method) {
  let data = rows;
  if (data.length > 0) {
    const first = (data[0][COL.REG_TITLE] || '').toString().trim();
    const isHeader = ['규정제목','규정 제목','Title','REG_TITLE','제목'].some(k => first.includes(k));
    if (isHeader) data = data.slice(1);
  }
  data = data.filter(r => r && r.some(v => v !== '' && v !== null && v !== undefined));
  allRows = data;
  updateCounts();
  renderCurrent();
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  dot.className = 'ok';
  txt.textContent = allRows.length + '개 항목 로드 완료 (' + method.toUpperCase() + ')';
}

function showError(msg) {
  document.getElementById('content').innerHTML = '<div class="empty-msg">' + escHtml(msg) + '</div>';
  document.getElementById('status-dot').className = 'err';
  document.getElementById('status-text').textContent = '로드 실패';
}

// =============================================
// FILTERS
// =============================================
function getJob(r) { return (r[COL.JOB_GROUP] || '').toLowerCase(); }
function isDoctor(r)   { return getJob(r).includes('의사'); }
function isNurse(r)    { return getJob(r).includes('간호사'); }
function isPharm(r)    { return getJob(r).includes('약사'); }
function isGuardian(r) { return getJob(r).includes('보호자'); }
function isQuestion(r) { return (r[COL.REG_TITLE] || '').toLowerCase().includes('질문'); }
function isReview(r)   {
  const job = getJob(r);
  return job === '' || job === '검토' || job.includes('규정');
}
function isEtc(r) {
  return !isDoctor(r) && !isNurse(r) && !isPharm(r) && !isGuardian(r) && !isQuestion(r) && !isReview(r);
}
function isJG(r) { return isDoctor(r) || isNurse(r) || isPharm(r) || isGuardian(r); }

function filterByTab(tab) {
  switch(tab) {
    case 'all':      return allRows;
    case 'review':   return allRows.filter(isReview);
    case 'jg':       return allRows.filter(isJG);
    case 'doctor':   return allRows.filter(isDoctor);
    case 'nurse':    return allRows.filter(isNurse);
    case 'pharm':    return allRows.filter(isPharm);
    case 'guardian': return allRows.filter(isGuardian);
    case 'etc':      return allRows.filter(isEtc);
    case 'question': return allRows.filter(isQuestion);
    default:         return allRows;
  }
}

function applySearch(rows, q) {
  if (!q) return rows;
  const lq = q.toLowerCase();
  return rows.filter(r =>
    (r[COL.REG_TITLE]   || '').toLowerCase().includes(lq) ||
    (r[COL.JOB_GROUP]   || '').toLowerCase().includes(lq) ||
    (r[COL.CRIT_TITLE]  || '').toLowerCase().includes(lq) ||
    (r[COL.SURVEY_ITEM] || '').toLowerCase().includes(lq) ||
    (r[COL.STANDARD]    || '').toLowerCase().includes(lq)
  );
}

// =============================================
// COUNTS
// =============================================
function updateCounts() {
  ['all','review','jg','doctor','nurse','pharm','guardian','etc','question'].forEach(tab => {
    const n = filterByTab(tab).length;
    const sb = document.getElementById('sb-' + tab);
    const sc = document.getElementById('sc-' + tab);
    if (sb) sb.textContent = n;
    if (sc) sc.textContent = n;
  });
}

// =============================================
// GROUP
// =============================================
function groupByTitle(rows) {
  const map = new Map();
  rows.forEach(r => {
    const title = r[COL.REG_TITLE] || '(제목없음)';
    if (!map.has(title)) map.set(title, []);
    map.get(title).push(r);
  });
  return map;
}

// =============================================
// RENDER
// =============================================
function renderCurrent() {
  const q        = (document.getElementById('search-input').value || '').trim();
  const filtered = applySearch(filterByTab(currentTab), q);
  const content  = document.getElementById('content');

  if (filtered.length === 0) {
    content.innerHTML = '<div class="empty-msg">표시할 항목이 없습니다.</div>';
    return;
  }

  const grouped = groupByTitle(filtered);
  const frag    = document.createDocumentFragment();

  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML =
    '<span class="section-title">' + filtered.length + '개 항목 / ' + grouped.size + '개 규정</span>' +
    '<button class="expand-all-btn" id="expand-all-btn">모두 펼치기</button>';
  frag.appendChild(header);

  let regIdx = 0;
  grouped.forEach((rows, title) => {
    regIdx++;
    const regCard = document.createElement('div');
    regCard.className = 'reg-card';

    const jobSet  = [...new Set(rows.map(r => r[COL.JOB_GROUP]).filter(Boolean))];
    const jobHtml = jobSet.map(j => {
      let cls = 'jg-etc';
      const jl = j.toLowerCase();
      if (jl.includes('의사'))       cls = 'jg-doctor';
      else if (jl.includes('간호사')) cls = 'jg-nurse';
      else if (jl.includes('약사'))   cls = 'jg-pharm';
      else if (jl.includes('보호자')) cls = 'jg-guardian';
      else if (jl.includes('질문'))   cls = 'jg-question';
      return '<span class="jg-tag ' + cls + '">' + escHtml(j) + '</span>';
    }).join('');

    const cardHeader = document.createElement('div');
    cardHeader.className = 'reg-card-header';
    cardHeader.innerHTML =
      '<div class="reg-card-left">' +
        '<span class="reg-num">' + String(regIdx).padStart(2,'0') + '</span>' +
        '<span class="reg-title">' + escHtml(title) + '</span>' +
        (jobHtml ? '<span style="display:flex;flex-wrap:wrap;gap:4px;flex-shrink:0;">' + jobHtml + '</span>' : '') +
      '</div>' +
      '<span class="reg-count-badge">' + rows.length + ' 항목</span>' +
      '<span class="reg-chevron">&#9660;</span>';

    const cardBody = document.createElement('div');
    cardBody.className = 'reg-card-body';
    rows.forEach((r, itemIdx) => {
      cardBody.appendChild(makeItemCard(r, itemIdx + 1));
    });

    cardHeader.addEventListener('click', function() {
      regCard.classList.toggle('open');
    });

    regCard.appendChild(cardHeader);
    regCard.appendChild(cardBody);
    frag.appendChild(regCard);
  });

  content.innerHTML = '';
  content.appendChild(frag);

  const expandBtn = document.getElementById('expand-all-btn');
  if (expandBtn) {
    expandBtn.addEventListener('click', function() {
      document.querySelectorAll('.reg-card').forEach(el => el.classList.add('open'));
      document.querySelectorAll('.item-card').forEach(el => el.classList.add('open'));
    });
  }
}

function makeItemCard(r, seq) {
  const itemCard = document.createElement('div');
  itemCard.className = 'item-card';

  const grade     = r[COL.GRADE]      || '';
  const chapter   = r[COL.CHAPTER]    || '';
  const critTitle = r[COL.CRIT_TITLE] || r[COL.SURVEY_ITEM] || '(항목없음)';

  let gradeCls = 'grade-default';
  if (grade === '필수' || grade === 'P')      gradeCls = 'grade-P';
  else if (grade === '선택' || grade === 'S') gradeCls = 'grade-S';
  else if (grade === 'M')                      gradeCls = 'grade-M';

  const itemHeader = document.createElement('div');
  itemHeader.className = 'item-header';
  itemHeader.innerHTML =
    '<div class="item-header-left">' +
      '<span class="item-seq">#' + String(seq).padStart(2,'0') + '</span>' +
      (grade   ? '<span class="grade-badge ' + gradeCls + '">' + escHtml(grade) + '</span>' : '') +
      (chapter ? '<span style="font-family:\'IBM Plex Mono\',monospace;font-size:10px;color:var(--text3);flex-shrink:0;">' + escHtml(chapter) + '</span>' : '') +
      '<span class="item-criterion-title">' + escHtml(critTitle) + '</span>' +
    '</div>' +
    '<span class="item-chevron">&#9660;</span>';

  const itemBody = document.createElement('div');
  itemBody.className = 'item-body';
  const fieldRows = document.createElement('div');
  fieldRows.className = 'field-rows';

  FIELD_LABELS.forEach(f => {
    const val     = r[f.key] || '';
    const fieldEl = document.createElement('div');
    fieldEl.className = 'field-row';
    fieldEl.innerHTML =
      '<div class="field-key">'  + escHtml(f.label) + '</div>' +
      '<div class="field-val' + (val ? '' : ' empty') + '">' + (val ? escHtml(val) : '-') + '</div>';
    fieldRows.appendChild(fieldEl);
  });

  if (r.length > 12) {
    for (let i = 12; i < r.length; i++) {
      if (r[i]) {
        const extraEl = document.createElement('div');
        extraEl.className = 'field-row';
        extraEl.innerHTML =
          '<div class="field-key">열 ' + String.fromCharCode(65 + i) + '</div>' +
          '<div class="field-val">' + escHtml(r[i]) + '</div>';
        fieldRows.appendChild(extraEl);
      }
    }
  }

  itemBody.appendChild(fieldRows);

  itemHeader.addEventListener('click', function(e) {
    e.stopPropagation();
    itemCard.classList.toggle('open');
  });

  itemCard.appendChild(itemHeader);
  itemCard.appendChild(itemBody);
  return itemCard;
}

// =============================================
// TAB
// =============================================
function setTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.sidebar-item').forEach(i => {
    i.classList.toggle('active', i.dataset.tab === tab);
  });
  document.querySelectorAll('.stat-card').forEach(c => {
    c.classList.toggle('active', c.dataset.tab === tab);
  });
  renderCurrent();
}

document.querySelectorAll('.sidebar-item').forEach(item => {
  item.addEventListener('click', function() { setTab(this.dataset.tab); });
});
document.querySelectorAll('.stat-card').forEach(card => {
  card.addEventListener('click', function() { setTab(this.dataset.tab); });
});

document.getElementById('search-input').addEventListener('input', function() {
  renderCurrent();
});

document.addEventListener('keydown', e => {
  const inp = document.getElementById('search-input');
  if (e.key === '/' && document.activeElement !== inp) {
    e.preventDefault(); inp.focus();
  }
  if (e.key === 'Escape') inp.blur();
});

function escHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

fetchSheet();
</script>
