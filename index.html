<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>한서재활요양병원 규정 뷰어</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0b09;
      --surface: #141210;
      --surface2: #1c1916;
      --surface3: #242018;
      --gold: #c9a84c;
      --gold2: #e8c97a;
      --gold-dim: rgba(201,168,76,0.15);
      --text: #ede8df;
      --text-muted: #7a7060;
      --text-mid: #a89880;
      --border: #2a2520;
      --border2: #3a342c;
      --success: #6db98a;
      --warning: #c9a84c;
      --danger: #c97a6d;
      --blue: #7a9fc9;
      --blue-dim: rgba(122,159,201,0.15);
      --teal: #6db9b0;
      --teal-dim: rgba(109,185,176,0.15);
      --purple: #a87ac9;
      --purple-dim: rgba(168,122,201,0.15);
      --pink: #c97aa0;
      --pink-dim: rgba(201,122,160,0.15);
      --green: #7ac9a0;
      --green-dim: rgba(122,201,160,0.15);
      --orange: #c9a07a;
      --orange-dim: rgba(201,160,122,0.15);
      --sidebar-w: 220px;
      --font: 'Malgun Gothic', '맑은 고딕', sans-serif;
    }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 999;
      opacity: 0.35;
    }

    #scrollProgress {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, var(--gold), var(--gold2));
      z-index: 9999;
      transition: width 0.1s linear;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 200;
      flex-shrink: 0;
    }

    .logo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }
    .logo-grid span { border-radius: 2px; background: var(--gold); }
    .logo-grid span:nth-child(2) { background: var(--gold2); opacity: 0.6; }
    .logo-grid span:nth-child(3) { background: var(--gold2); opacity: 0.4; }
    .logo-grid span:nth-child(4) { background: var(--gold); opacity: 0.8; }

    .header-titles { display: flex; flex-direction: column; gap: 1px; }
    .header-sub { font-family: var(--font); font-size: 9px; letter-spacing: 2.5px; color: var(--text-muted); text-transform: uppercase; }
    .header-main { font-family: var(--font); font-size: 17px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }

    .header-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }

    .header-status { font-family: var(--font); font-size: 11px; color: var(--text-muted); display: flex; align-items: center; gap: 6px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--warning); animation: pulse 2.5s infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

    .print-btn {
      font-family: var(--font); font-size: 11px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 12px; color: var(--text-muted);
      cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px;
    }
    .print-btn:hover { border-color: var(--gold); color: var(--gold); }

    .app-body { display: flex; flex: 1; min-height: 0; }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-w); flex-shrink: 0;
      background: var(--surface); border-right: 1px solid var(--border);
      position: sticky; top: 57px; height: calc(100vh - 57px);
      overflow-y: auto; padding: 20px 0;
      display: flex; flex-direction: column; gap: 4px;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-track { background: transparent; }
    .sidebar::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

    .sidebar-section-label {
      font-family: var(--font); font-size: 9px; letter-spacing: 2px;
      color: var(--text-muted); text-transform: uppercase; padding: 10px 18px 4px;
    }
    .sidebar-sep { height: 1px; background: var(--border); margin: 8px 18px; }

    .tab-btn {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 18px 9px 14px; font-size: 13px; font-family: var(--font);
      font-weight: 500; color: var(--text-muted); cursor: pointer;
      border: none; background: transparent; width: 100%; text-align: left;
      transition: all 0.18s; border-radius: 0; gap: 8px;
      border-left: 2px solid transparent;
    }
    .tab-btn:hover { background: var(--surface2); color: var(--text); }
    .tab-btn.active                { color: var(--gold);     background: var(--gold-dim);   border-left-color: var(--gold); }
    .tab-btn.active.purple-tab     { color: var(--purple);   background: var(--purple-dim); border-left-color: var(--purple); }
    .tab-btn.active.pink-tab       { color: var(--pink);     background: var(--pink-dim);   border-left-color: var(--pink); }
    .tab-btn.active.green-tab      { color: var(--green);    background: var(--green-dim);  border-left-color: var(--green); }
    .tab-btn.active.orange-tab     { color: var(--orange);   background: var(--orange-dim); border-left-color: var(--orange); }
    .tab-btn.active.gray-tab       { color: var(--text-mid); background: var(--surface3);   border-left-color: var(--text-mid); }
    .tab-btn.active.blue-tab       { color: var(--blue);     background: var(--blue-dim);   border-left-color: var(--blue); }
    .tab-btn.active.teal-tab       { color: var(--teal);     background: var(--teal-dim);   border-left-color: var(--teal); }

    .tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; background: var(--text-muted); }
    .tab-btn.active .tab-dot                { background: var(--gold); }
    .tab-btn.active.purple-tab .tab-dot     { background: var(--purple); }
    .tab-btn.active.pink-tab   .tab-dot     { background: var(--pink); }
    .tab-btn.active.green-tab  .tab-dot     { background: var(--green); }
    .tab-btn.active.orange-tab .tab-dot     { background: var(--orange); }
    .tab-btn.active.gray-tab   .tab-dot     { background: var(--text-mid); }
    .tab-btn.active.blue-tab   .tab-dot     { background: var(--blue); }
    .tab-btn.active.teal-tab   .tab-dot     { background: var(--teal); }

    .tab-label { flex: 1; }

    .tab-badge {
      font-family: var(--font); font-size: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      color: var(--text-muted); border-radius: 20px;
      padding: 1px 7px; flex-shrink: 0; min-width: 28px; text-align: center;
    }
    .tab-btn.active .tab-badge                { border-color: var(--gold);     color: var(--gold);     background: var(--gold-dim); }
    .tab-btn.active.purple-tab .tab-badge     { border-color: var(--purple);   color: var(--purple);   background: var(--purple-dim); }
    .tab-btn.active.pink-tab   .tab-badge     { border-color: var(--pink);     color: var(--pink);     background: var(--pink-dim); }
    .tab-btn.active.green-tab  .tab-badge     { border-color: var(--green);    color: var(--green);    background: var(--green-dim); }
    .tab-btn.active.orange-tab .tab-badge     { border-color: var(--orange);   color: var(--orange);   background: var(--orange-dim); }
    .tab-btn.active.gray-tab   .tab-badge     { border-color: var(--text-mid); color: var(--text-mid); background: var(--surface3); }
    .tab-btn.active.blue-tab   .tab-badge     { border-color: var(--blue);     color: var(--blue);     background: var(--blue-dim); }
    .tab-btn.active.teal-tab   .tab-badge     { border-color: var(--teal);     color: var(--teal);     background: var(--teal-dim); }

    /* ── MAIN ── */
    .main-area { flex: 1; min-width: 0; padding: 28px; overflow-y: auto; }

    .search-section { margin-bottom: 20px; }
    .search-wrap { position: relative; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); pointer-events: none; }
    .search-wrap input {
      width: 100%; background: var(--surface); border: 1px solid var(--border);
      border-radius: 10px; padding: 13px 44px 13px 42px; font-size: 14px;
      font-family: var(--font); color: var(--text); outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px var(--gold-dim); }
    .search-clear {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: var(--surface3); border: 1px solid var(--border); border-radius: 50%;
      width: 22px; height: 22px; display: none; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-muted); font-size: 12px; transition: all 0.15s;
    }
    .search-clear:hover { background: var(--border2); color: var(--text); }
    .search-clear.visible { display: flex; }

    /* ── NAV CARDS ── */
    .nav-cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }

    .nav-card {
      background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
      padding: 18px 20px; cursor: pointer; transition: all 0.2s;
      display: flex; flex-direction: column; gap: 6px; position: relative; overflow: hidden;
    }
    .nav-card::before {
      content: ''; position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px; background: var(--gold); opacity: 0; transition: opacity 0.2s;
    }
    .nav-card:hover { border-color: var(--border2); transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .nav-card:hover::before { opacity: 0.5; }
    .nav-card.active { border-color: var(--gold); background: var(--gold-dim); }
    .nav-card.active::before { opacity: 1; }

    .nav-card.purple-card.active  { border-color: var(--purple);   background: var(--purple-dim); }
    .nav-card.purple-card::before { background: var(--purple); }
    .nav-card.pink-card.active    { border-color: var(--pink);     background: var(--pink-dim); }
    .nav-card.pink-card::before   { background: var(--pink); }
    .nav-card.green-card.active   { border-color: var(--green);    background: var(--green-dim); }
    .nav-card.green-card::before  { background: var(--green); }
    .nav-card.orange-card.active  { border-color: var(--orange);   background: var(--orange-dim); }
    .nav-card.orange-card::before { background: var(--orange); }
    .nav-card.gray-card.active    { border-color: var(--text-mid); background: var(--surface3); }
    .nav-card.gray-card::before   { background: var(--text-mid); }
    .nav-card.blue-card.active    { border-color: var(--blue);     background: var(--blue-dim); }
    .nav-card.blue-card::before   { background: var(--blue); }
    .nav-card.teal-card.active    { border-color: var(--teal);     background: var(--teal-dim); }
    .nav-card.teal-card::before   { background: var(--teal); }

    .nav-card-en { font-family: var(--font); font-size: 9px; letter-spacing: 2px; color: var(--text-muted); text-transform: uppercase; }
    .nav-card-count { font-family: var(--font); font-size: 28px; font-weight: 700; color: var(--gold); line-height: 1; }
    .nav-card.purple-card .nav-card-count { color: var(--purple); }
    .nav-card.pink-card   .nav-card-count { color: var(--pink); }
    .nav-card.green-card  .nav-card-count { color: var(--green); }
    .nav-card.orange-card .nav-card-count { color: var(--orange); }
    .nav-card.gray-card   .nav-card-count { color: var(--text-mid); }
    .nav-card.blue-card   .nav-card-count { color: var(--blue); }
    .nav-card.teal-card   .nav-card-count { color: var(--teal); }
    .nav-card-name { font-family: var(--font); font-size: 13px; font-weight: 700; color: var(--text); }

    .result-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .result-info { font-family: var(--font); font-size: 11px; color: var(--text-muted); }
    .result-info strong { color: var(--gold); }

    .expand-all-btn {
      font-family: var(--font); font-size: 11px; letter-spacing: 0.5px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 6px; padding: 6px 14px; color: var(--text-muted);
      cursor: pointer; transition: all 0.15s;
    }
    .expand-all-btn:hover { border-color: var(--border2); color: var(--text); }

    /* ── ACCORDION ── */
    .reg-list, .jobgroup-list { display: flex; flex-direction: column; gap: 10px; }

    .reg-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
    .reg-card:hover { border-color: var(--border2); }
    .reg-card.expanded                { border-color: var(--gold); }
    .reg-card.blue-card.expanded      { border-color: var(--blue); }
    .reg-card.teal-card.expanded      { border-color: var(--teal); }
    .reg-card.purple-card.expanded    { border-color: var(--purple); }
    .reg-card.pink-card.expanded      { border-color: var(--pink); }
    .reg-card.green-card.expanded     { border-color: var(--green); }
    .reg-card.orange-card.expanded    { border-color: var(--orange); }
    .reg-card.gray-card.expanded      { border-color: var(--text-mid); }

    .reg-card-header { display: flex; align-items: center; gap: 14px; padding: 14px 18px; cursor: pointer; user-select: none; }
    .reg-num { font-family: var(--font); font-size: 11px; color: var(--text-muted); width: 22px; flex-shrink: 0; }
    .reg-title { font-family: var(--font); font-size: 14px; font-weight: 700; color: var(--text); flex: 1; }
    .reg-count-badge {
      font-family: var(--font); font-size: 11px; background: var(--surface2);
      border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px;
      padding: 3px 9px; white-space: nowrap; flex-shrink: 0;
    }
    .reg-card.expanded .reg-count-badge                { border-color: var(--gold);     color: var(--gold);     background: var(--gold-dim); }
    .reg-card.blue-card.expanded   .reg-count-badge    { border-color: var(--blue);     color: var(--blue);     background: var(--blue-dim); }
    .reg-card.teal-card.expanded   .reg-count-badge    { border-color: var(--teal);     color: var(--teal);     background: var(--teal-dim); }
    .reg-card.purple-card.expanded .reg-count-badge    { border-color: var(--purple);   color: var(--purple);   background: var(--purple-dim); }
    .reg-card.pink-card.expanded   .reg-count-badge    { border-color: var(--pink);     color: var(--pink);     background: var(--pink-dim); }
    .reg-card.green-card.expanded  .reg-count-badge    { border-color: var(--green);    color: var(--green);    background: var(--green-dim); }
    .reg-card.orange-card.expanded .reg-count-badge    { border-color: var(--orange);   color: var(--orange);   background: var(--orange-dim); }
    .reg-card.gray-card.expanded   .reg-count-badge    { border-color: var(--text-mid); color: var(--text-mid); background: var(--surface3); }

    .toggle-arrow { width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: transform 0.25s; }
    .reg-card.expanded .toggle-arrow,
    .jg-card.expanded  .toggle-arrow { transform: rotate(180deg); }

    .reg-card-body { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1); }
    .reg-card-body-inner { padding: 0 18px 18px; border-top: 1px solid var(--border); }

    /* ── JOB GROUP ── */
    .jg-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s; }
    .jg-card:hover { border-color: var(--border2); }
    .jg-card.expanded { border-color: var(--gold); }
    .jg-card-header { display: flex; align-items: center; gap: 14px; padding: 14px 18px; cursor: pointer; user-select: none; }
    .jg-num  { font-family: var(--font); font-size: 11px; color: var(--text-muted); width: 22px; flex-shrink: 0; }
    .jg-name { font-family: var(--font); font-size: 14px; font-weight: 700; color: var(--text); flex: 1; }
    .jg-count { font-family: var(--font); font-size: 11px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-muted); border-radius: 6px; padding: 3px 9px; white-space: nowrap; flex-shrink: 0; }
    .jg-card.expanded .jg-count { border-color: var(--gold); color: var(--gold); background: var(--gold-dim); }
    .jg-card-body { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4,0,0.2,1); }
    .jg-card-body-inner { padding: 0 18px 18px; border-top: 1px solid var(--border); }
    .jg-reg-group { margin-top: 14px; }
    .jg-reg-title { font-size: 12px; font-weight: 700; color: var(--gold); margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); font-family: var(--font); }

    /* ── ITEM CARDS ── */
    .item-list { display: flex; flex-direction: column; gap: 10px; margin-top: 14px; }
    .item-card { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
    .item-card-header { display: flex; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface3); border-bottom: 1px solid var(--border); cursor: pointer; user-select: none; }
    .item-idx { font-family: var(--font); font-size: 10px; color: var(--text-muted); }
    .grade-badge { font-family: var(--font); font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 4px; }
    .grade-A { background: rgba(109,185,138,0.15); color: var(--success); border: 1px solid rgba(109,185,138,0.3); }
    .grade-B { background: rgba(201,168,76,0.15);  color: var(--warning); border: 1px solid rgba(201,168,76,0.3); }
    .grade-C { background: rgba(201,122,109,0.15); color: var(--danger);  border: 1px solid rgba(201,122,109,0.3); }
    .grade-default { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
    .item-division { font-size: 11px; color: var(--text-muted); font-family: var(--font); flex: 1; }
    .item-toggle-arrow { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); transition: transform 0.2s; flex-shrink: 0; }
    .item-card.item-expanded .item-toggle-arrow { transform: rotate(180deg); }
    .item-body { max-height: 0; overflow: hidden; transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1); }
    .item-card.item-expanded .item-body { max-height: 2000px; }

    .field-rows { padding: 12px; display: flex; flex-direction: column; gap: 0; }
    .field-row { display: grid; grid-template-columns: 90px 1fr; gap: 0; border-bottom: 1px solid var(--border); min-height: 34px; }
    .field-row:last-child { border-bottom: none; }
    .field-label { font-family: var(--font); font-size: 10px; color: var(--text-muted); letter-spacing: 0.5px; padding: 8px 10px 8px 0; border-right: 1px solid var(--border); display: flex; align-items: flex-start; }
    .field-value { font-size: 12px; font-family: var(--font); color: var(--text); padding: 8px 0 8px 12px; line-height: 1.6; word-break: break-word; }
    .field-value.empty { color: var(--text-muted); font-style: italic; }

    mark { background: rgba(201,168,76,0.3); color: var(--gold2); border-radius: 2px; padding: 0 1px; }

    /* ── 디버그 배지 ── */
    .debug-note {
      font-size: 9px; font-family: var(--font); color: var(--text-muted);
      background: var(--surface3); border: 1px solid var(--border);
      border-radius: 4px; padding: 2px 6px; margin-left: 6px;
      display: inline-block; vertical-align: middle;
    }

    /* ── LOADING / ERROR ── */
    .loading-screen, .error-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; gap: 16px; text-align: center; }
    .spinner { width: 36px; height: 36px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.9s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--text-muted); font-size: 12px; font-family: var(--font); letter-spacing: 1px; }
    .error-box { background: rgba(201,122,109,0.08); border: 1px solid rgba(201,122,109,0.3); border-radius: 12px; padding: 24px 32px; color: var(--danger); font-size: 13px; max-width: 480px; line-height: 1.7; }
    .empty-state { text-align: center; padding: 48px; color: var(--text-muted); font-size: 13px; font-family: var(--font); }

    @media print {
      .sidebar, header, .nav-cards, .search-section, .result-row, #scrollProgress { display: none !important; }
      .main-area { padding: 0; }
      .reg-card-body, .jg-card-body { max-height: none !important; }
      body { background: white; color: black; }
    }

    @media (max-width: 900px) { .nav-cards { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 768px) {
      .sidebar { display: none !important; }
      .main-area { padding: 16px; }
      .nav-cards { grid-template-columns: repeat(2, 1fr); }

<script>
(function () {
  'use strict';

  var SPREADSHEET_ID = '18dDgxsczklu9FRm053w2rqLDFDjqm7C18rijuyJdrkI';
  var DIRECT_URL = 'https://docs.google.com/spreadsheets/d/' + SPREADSHEET_ID + '/export?format=csv&gid=0';
  var PROXY_URL  = 'https://api.allorigins.win/raw?url=' + encodeURIComponent(DIRECT_URL);

  var COL = {
    규정제목: 0, 직군: 1, 조사항목등급: 2, 조사항목구분: 3,
    조사항목장: 4, 기준제목: 5, 기준: 6, 조사항목: 7,
    기준이해: 8, 조사내용: 9, 조사목적: 10, 참고자료: 11,
  };

  /*
   * ================================================================
   * 직군 키워드 정의
   * ================================================================
   * B열(직군)에 해당 키워드가 포함되면 해당 탭에 표시합니다.
   * 하나의 행이 여러 탭에 동시에 나타날 수 있습니다.
   * (예: "간호사, 약사" → 간호사 탭 + 약사 탭 모두 표시)
   * ================================================================
   */
  var JOB_KEYWORDS = {
    doctor:   ['의사'],
    nurse:    ['간호사'],
    pharm:    ['약사'],
    guardian: ['보호자'],
  };

  /*
   * ================================================================
   * 분류 함수 설계 원칙
   * ================================================================
   * - isReview : B열에 "규정검토" 또는 "규정 검토" 포함
   * - isQuestion: A열(규정제목)에 "질문" 포함
   * - isDoctor/isNurse/isPharm/isGuardian:
   *     B열에 해당 키워드 포함이면 무조건 해당 탭에 포함
   *     (isQuestion, isReview 여부와 무관)
   * - isEtc: B열에 어떤 직군 키워드도 없고, isReview도 아닌 행
   * - isAll: 모든 행
   * ================================================================
   */

  var allRows     = [];
  var currentView = 'all';
  var searchQuery = '';
  var allExpanded = false;

  /* ── 문자열 정규화 ── */
  function norm(s) {
    if (!s) return '';
    return s.replace(/\ufeff/g,'').replace(/\u00a0/g,' ').replace(/\u3000/g,' ').trim().toLowerCase();
  }

  /* ── CSV 파서 ── */
  function parseCSV(text) {
    var lines = [];
    var cur = '', inQ = false, row = [];
    for (var i = 0; i < text.length; i++) {
      var ch = text[i];
      if (ch === '"') {
        if (inQ && text[i+1] === '"') { cur += '"'; i++; }
        else { inQ = !inQ; }
      } else if (ch === ',' && !inQ) {
        row.push(cur.trim()); cur = '';
      } else if ((ch === '\n' || ch === '\r') && !inQ) {
        if (ch === '\r' && text[i+1] === '\n') i++;
        row.push(cur.trim()); cur = '';
        lines.push(row); row = [];
      } else { cur += ch; }
    }
    if (cur !== '' || row.length) { row.push(cur.trim()); lines.push(row); }
    return lines;
  }

  /* ── 분류 함수 ── */

  /* 규정 검토: B열에 "규정검토" 또는 "규정 검토" 포함 */
  function isReview(r) {
    var v = norm(r[COL.직군]);
    return v.indexOf('규정검토') !== -1 || v.indexOf('규정 검토') !== -1;
  }

  /* 질문: A열(규정제목)에 "질문" 포함 */
  function isQuestion(r) {
    return norm(r[COL.규정제목]).indexOf('질문') !== -1;
  }

  /*
   * 직군 탭 필터: B열에 해당 키워드가 하나라도 포함되면 해당 탭에 표시
   * isQuestion, isReview 여부를 따지지 않음 → 데이터 누락 방지
   */
  function hasJobKeyword(r, keywords) {
    var v = norm(r[COL.직군]);
    for (var i = 0; i < keywords.length; i++) {
      if (v.indexOf(norm(keywords[i])) !== -1) return true;
    }
    return false;
  }

  function isDoctor(r)   { return hasJobKeyword(r, JOB_KEYWORDS.doctor); }
  function isNurse(r)    { return hasJobKeyword(r, JOB_KEYWORDS.nurse); }
  function isPharm(r)    { return hasJobKeyword(r, JOB_KEYWORDS.pharm); }
  function isGuardian(r) { return hasJobKeyword(r, JOB_KEYWORDS.guardian); }

  /*
   * 기타 직군: 어떤 직군 키워드도 없고, 규정검토도 아닌 행
   * (질문 탭 행이라도 직군 키워드가 없으면 기타에 포함)
   */
  function isEtc(r) {
    if (isReview(r)) return false;
    var allKeywords = [].concat(
      JOB_KEYWORDS.doctor, JOB_KEYWORDS.nurse,
      JOB_KEYWORDS.pharm,  JOB_KEYWORDS.guardian
    );
    return !hasJobKeyword(r, allKeywords);
  }

  /*
   * 직군별 보기: 규정검토가 아닌 모든 행 (직군 정보가 있는 행)
   * 직군별 보기는 B열 값 기준으로 그룹핑
   */
  function isGeneral(r) { return !isReview(r); }

  /* 전체 탭: 모든 행 */
  function isAll(r) { return true; }

  /* ── HTML 이스케이프 ── */
  function esc(str) {
    if (!str) return '-';
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  /* ── 검색 하이라이트 ── */
  function highlight(str, q) {
    if (!str) return '-';
    var escaped = str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    if (!q) return escaped;
    var re = new RegExp('(' + q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&') + ')', 'gi');
    return escaped.replace(re, '<mark>$1</mark>');
  }

  /* ── 유틸 ── */
  function el(id)         { return document.getElementById(id); }
  function setText(id, v) { var e = el(id); if (e) e.textContent = v; }
  function pad(n)         { return String(n).padStart(2, '0'); }

  /* ── 스크롤 진행 바 ── */
  el('mainArea').addEventListener('scroll', function() {
    var area = el('mainArea');
    var pct  = area.scrollTop / (area.scrollHeight - area.clientHeight) * 100;
    el('scrollProgress').style.width = (isNaN(pct) ? 0 : pct) + '%';
  });

  /* ── 데이터 로드 ── */
  async function loadData() {
    var text = null;
    try {
      var res = await fetch(DIRECT_URL);
      if (res.ok) text = await res.text();
    } catch(_) {}

    if (!text) {
      try {
        var res2 = await fetch(PROXY_URL);
        if (res2.ok) text = await res2.text();
      } catch(e) { showError('네트워크 오류: ' + e.message); return; }
    }

    if (!text) { showError('데이터를 불러오지 못했습니다.'); return; }

    var rows = parseCSV(text);
    if (rows.length < 2) { showError('시트에 데이터가 없습니다.'); return; }

    allRows = rows.slice(1).filter(function(r) { return r.some(function(c) { return c !== ''; }); });
    if (!allRows.length) { showError('유효한 데이터 행이 없습니다.'); return; }

    updateBadges();

    el('statusDot').style.background = '#6db98a';
    el('statusDot').style.animation  = 'none';
    setText('statusText', allRows.length + '개 항목 로드 완료');
    el('loadingScreen').style.display = 'none';
    el('mainContent').style.display   = 'block';

    var hash = location.hash.replace('#','');
    var validTabs = ['all','jobgroup','doctor','nurse','pharm','guardian','etc','question','review'];
    if (hash && validTabs.indexOf(hash) !== -1) switchTab(hash);

    rerender();
  }

  function showError(msg) {
    el('loadingScreen').style.display = 'none';
    el('errorScreen').style.display   = 'flex';
    el('errorMsg').innerHTML = '<strong>데이터를 불러오지 못했습니다.</strong><br/><br/>' + msg;
    el('statusDot').style.background = '#c97a6d';
    setText('statusText', '로드 실패');
  }

  /* ── 배지 업데이트 ── */
  function updateBadges() {
    var allRegSet = new Set(allRows.map(function(r) { return r[COL.규정제목]; }).filter(Boolean));

    /*
     * 직군별 보기: 고유 B열 값 개수 (규정검토 제외)
     * 직군 탭: 해당 키워드를 가진 행 수 (중복 허용)
     */
    var genRows  = allRows.filter(isGeneral);
    var grpSet   = new Set(genRows.map(function(r) { return r[COL.직군]; }).filter(Boolean));

    var counts = {
      all:      allRegSet.size,
      jobgroup: grpSet.size,
      doctor:   allRows.filter(isDoctor).length,
      nurse:    allRows.filter(isNurse).length,
      pharm:    allRows.filter(isPharm).length,
      guardian: allRows.filter(isGuardian).length,
      etc:      allRows.filter(isEtc).length,
      question: allRows.filter(isQuestion).length,
      review:   allRows.filter(isReview).length,
    };

    Object.keys(counts).forEach(function(k) {
      setText('sb-' + k, counts[k]);
      setText('nc-' + k, counts[k]);
    });
  }

  /* ── 검색 필터 적용 ── */
  function applySearch(rows) {
    if (!searchQuery) return rows;
    var q = searchQuery.toLowerCase();
    return rows.filter(function(r) {
      return (r[COL.규정제목]    || '').toLowerCase().indexOf(q) !== -1 ||
             (r[COL.기준제목]    || '').toLowerCase().indexOf(q) !== -1 ||
             (r[COL.조사항목]    || '').toLowerCase().indexOf(q) !== -1 ||
             (r[COL.직군]        || '').toLowerCase().indexOf(q) !== -1 ||
             (r[COL.조사항목구분]|| '').toLowerCase().indexOf(q) !== -1;
    });
  }

  function getFiltered(filterFn) {
    return applySearch(allRows.filter(filterFn));
  }

  /* ── 규정제목 그룹 아코디언 렌더 ── */
  function renderAccordion(containerId, rows, cardClass) {
    var container = el(containerId);
    container.innerHTML = '';
    if (!rows.length) {
      container.innerHTML = '<div class="empty-state">표시할 데이터가 없습니다.</div>';
      updateResultInfo(0);
      return;
    }

    var order = [], groups = {};
    rows.forEach(function(r) {
      var t = r[COL.규정제목] || '(제목 없음)';
      if (!groups[t]) { groups[t] = []; order.push(t); }
      groups[t].push(r);
    });

    updateResultInfo(order.length);

    order.forEach(function(title, idx) {
      var rowSet = groups[title];
      var card   = document.createElement('div');
      card.className = 'reg-card' + (cardClass ? ' ' + cardClass : '');
      card.innerHTML =
        '<div class="reg-card-header">' +
          '<span class="reg-num">' + pad(idx+1) + '</span>' +
          '<span class="reg-title">' + highlight(title, searchQuery) + '</span>' +
          '<span class="reg-count-badge">' + rowSet.length + ' 항목</span>' +
          '<span class="toggle-arrow"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>' +
        '</div>' +
        '<div class="reg-card-body"><div class="reg-card-body-inner"><div class="item-list">' +
          rowSet.map(function(r, i) { return itemCardHtml(r, i); }).join('') +
        '</div></div></div>';

      card.querySelector('.reg-card-header').addEventListener('click', function() { toggleCard(card); });
      card.querySelectorAll('.item-card-header').forEach(function(hdr) {
        hdr.addEventListener('click', function(e) {
          e.stopPropagation();
          var ic   = hdr.closest('.item-card');
          var body = ic.querySelector('.item-body');
          ic.classList.toggle('item-expanded');
          body.style.maxHeight = ic.classList.contains('item-expanded') ? (body.scrollHeight + 500) + 'px' : '0';
        });
      });
      container.appendChild(card);
    });
  }

  /* ── 직군별 아코디언 렌더 ── */
  function renderJobGroup() {
    var container = el('jobgroupList');
    container.innerHTML = '';
    var filtered = getFiltered(isGeneral);
    if (!filtered.length) {
      container.innerHTML = '<div class="empty-state">표시할 데이터가 없습니다.</div>';
      return;
    }

    var order = [], byGroup = {};
    filtered.forEach(function(r) {
      var g = r[COL.직군] || '(직군 없음)';
      if (!byGroup[g]) { byGroup[g] = []; order.push(g); }
      byGroup[g].push(r);
    });
    order.sort(function(a,b) { return a.localeCompare(b); });

    order.forEach(function(group, idx) {
      var rows = byGroup[group];
      var regOrder = [], byReg = {};
      rows.forEach(function(r) {
        var t = r[COL.규정제목] || '(제목 없음)';
        if (!byReg[t]) { byReg[t] = []; regOrder.push(t); }
        byReg[t].push(r);
      });

      var card = document.createElement('div');
      card.className = 'jg-card';
      card.innerHTML =
        '<div class="jg-card-header">' +
          '<span class="jg-num">' + pad(idx+1) + '</span>' +
          '<span class="jg-name">' + esc(group) + '</span>' +
          '<span class="jg-count">' + rows.length + ' 항목</span>' +
          '<span class="toggle-arrow"><svg viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>' +
        '</div>' +
        '<div class="jg-card-body"><div class="jg-card-body-inner">' +
          regOrder.map(function(regTitle) {
            return '<div class="jg-reg-group"><div class="jg-reg-title">' + esc(regTitle) + '</div>' +
              '<div class="item-list">' + byReg[regTitle].map(function(r,i) { return itemCardHtml(r,i); }).join('') + '</div></div>';
          }).join('') +
        '</div></div>';

      card.querySelector('.jg-card-header').addEventListener('click', function() { toggleCard(card); });
      card.querySelectorAll('.item-card-header').forEach(function(hdr) {
        hdr.addEventListener('click', function(e) {
          e.stopPropagation();
          var ic   = hdr.closest('.item-card');
          var body = ic.querySelector('.item-body');
          ic.classList.toggle('item-expanded');
          body.style.maxHeight = ic.classList.contains('item-expanded') ? (body.scrollHeight + 500) + 'px' : '0';
        });
      });
      container.appendChild(card);
    });
  }

  /* ── 항목 카드 HTML ── */
  function itemCardHtml(r, i) {
    var grade = (r[COL.조사항목등급] || '').toUpperCase();
    var gradeClass = ['A','B','C'].indexOf(grade) !== -1 ? 'grade-' + grade : 'grade-default';
    var fields = [
      { label: '직군',      val: r[COL.직군] },
      { label: '구분',      val: r[COL.조사항목구분] },
      { label: 'Chapter',   val: r[COL.조사항목장] },
      { label: '기준 제목', val: r[COL.기준제목] },
      { label: '기준',      val: r[COL.기준] },
      { label: '조사 항목', val: r[COL.조사항목] },
      { label: '기준 이해', val: r[COL.기준이해] },
      { label: '조사 내용', val: r[COL.조사내용] },
      { label: '조사 목적', val: r[COL.조사목적] },
      { label: '참고 자료', val: r[COL.참고자료] },
    ];
    return '<div class="item-card">' +
      '<div class="item-card-header">' +
        '<span class="item-idx">#' + pad(i+1) + '</span>' +
        '<span class="grade-badge ' + gradeClass + '">' + (esc(grade) || '-') + '</span>' +
        '<span class="item-division">' + highlight(r[COL.조사항목구분], searchQuery) + '</span>' +
        '<span class="item-toggle-arrow"><svg viewBox="0 0 24 24" width="11" height="11" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg></span>' +
      '</div>' +
      '<div class="item-body"><div class="field-rows">' +
        fields.map(function(f) {
          return '<div class="field-row">' +
            '<div class="field-label">' + f.label + '</div>' +
            '<div class="field-value' + (f.val ? '' : ' empty') + '">' + highlight(f.val, searchQuery) + '</div>' +
          '</div>';
        }).join('') +
      '</div></div></div>';
  }

  /* ── 아코디언 토글 ── */
  function toggleCard(card) {
    var body  = card.querySelector('.reg-card-body, .jg-card-body');
    var inner = card.querySelector('.reg-card-body-inner, .jg-card-body-inner');
    if (card.classList.contains('expanded')) {
      body.style.maxHeight = '0';
      card.classList.remove('expanded');
    } else {
      card.classList.add('expanded');
      body.style.maxHeight = (inner.scrollHeight + 9999) + 'px';
    }
  }

  /* ── 탭 전환 ── */
  function switchTab(tab) {
    currentView = tab;
    location.hash = tab;

    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.classList.toggle('active', btn.dataset.tab === tab);
    });
    document.querySelectorAll('.nav-card').forEach(function(card) {
      card.classList.toggle('active', card.dataset.tab === tab);
    });

    var views = ['all','jobgroup','doctor','nurse','pharm','guardian','etc','question','review'];
    views.forEach(function(v) {
      var viewEl = el('view-' + v);
      if (viewEl) viewEl.style.display = v === tab ? 'block' : 'none';
    });

    allExpanded = false;
    setText('expandAllBtn', '모두 펼치기');
  }

  /* ── 모두 펼치기/접기 ── */
  function toggleExpandAll() {
    allExpanded = !allExpanded;
    setText('expandAllBtn', allExpanded ? '모두 접기' : '모두 펼치기');
    var listMap = {
      all: 'regList', jobgroup: 'jobgroupList',
      doctor: 'doctorList', nurse: 'nurseList',
      pharm: 'pharmList', guardian: 'guardianList',
      etc: 'etcList', question: 'questionList', review: 'reviewList',
    };
    var container = el(listMap[currentView]);
    if (!container) return;
    container.querySelectorAll('.reg-card, .jg-card').forEach(function(card) {
      var body  = card.querySelector('.reg-card-body, .jg-card-body');
      var inner = card.querySelector('.reg-card-body-inner, .jg-card-body-inner');
      if (allExpanded) {
        card.classList.add('expanded');
        body.style.maxHeight = (inner.scrollHeight + 9999) + 'px';
      } else {
        card.classList.remove('expanded');
        body.style.maxHeight = '0';
      }
    });
  }

  /* ── 전체 재렌더 ── */
  function rerender() {
    allExpanded = false;
    setText('expandAllBtn', '모두 펼치기');

    renderAccordion('regList',      getFiltered(isAll),      '');
    renderAccordion('reviewList',   getFiltered(isReview),   'teal-card');
    renderAccordion('doctorList',   getFiltered(isDoctor),   'purple-card');
    renderAccordion('nurseList',    getFiltered(isNurse),    'pink-card');
    renderAccordion('pharmList',    getFiltered(isPharm),    'green-card');
    renderAccordion('guardianList', getFiltered(isGuardian), 'orange-card');
    renderAccordion('etcList',      getFiltered(isEtc),      'gray-card');
    renderAccordion('questionList', getFiltered(isQuestion), 'blue-card');
    renderJobGroup();
  }

  /* ── 결과 정보 ── */
  function updateResultInfo(count) {
    var infoEl = el('resultInfo');
    if (searchQuery) {
      infoEl.innerHTML = '<strong>' + count + '</strong> 규정 검색됨';
    } else {
      infoEl.innerHTML = '<strong>' + count + '</strong> 규정';
    }
  }

  /* ── 이벤트 바인딩 ── */
  el('searchInput').addEventListener('input', function(e) {
    searchQuery = e.target.value;
    el('searchClear').classList.toggle('visible', searchQuery.length > 0);
    rerender();
  });

  el('searchClear').addEventListener('click', function() {
    el('searchInput').value = '';
    searchQuery = '';
    el('searchClear').classList.remove('visible');
    rerender();
    el('searchInput').focus();
  });

  el('expandAllBtn').addEventListener('click', toggleExpandAll);

  document.querySelectorAll('.tab-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { switchTab(btn.dataset.tab); });
  });
  document.querySelectorAll('.nav-card').forEach(function(card) {
    card.addEventListener('click', function() { switchTab(card.dataset.tab); });
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === '/' && document.activeElement !== el('searchInput')) {
      e.preventDefault();
      el('searchInput').focus();
    }
    if (e.key === 'Escape' && document.activeElement === el('searchInput')) {
      el('searchInput').blur();
      el('searchInput').value = '';
      searchQuery = '';
      el('searchClear').classList.remove('visible');
      rerender();
    }
    if ((e.key === 'e' || e.key === 'E') && document.activeElement.tagName !== 'INPUT') {
      toggleExpandAll();
    }
  });

  loadData();
})();
</script>
</body>
</html>
