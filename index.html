<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>구글 시트 데이터</title>
    <style>
        body {
            font-family: Arial, sans-serif;
        }
        .container {
            width: 80%;
            margin: auto;
        }
        .card {
            border: 1px solid #ccc;
            border-radius: 5px;
            padding: 15px;
            margin: 10px 0;
        }
        .label {
            font-weight: bold;
        }
        /* 추가적인 스타일 필요 시 수정 */
    </style>
</head>
<body>
    <div class="container">
        <h1>구글 시트 데이터</h1>
        <div id="data-container"></div>
    </div>

    <script>
        const SHEET_ID = "1aBcDeFgHiJkLmNoPqRstUvWxYz";  // 여기에 스프레드시트 ID 입력
        const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

        fetch(URL)
            .then(response => response.text())
            .then(data => {
                const jsonData = JSON.parse(data.substr(47).slice(0, -2));
                const tableData = jsonData.table.rows;

                const container = document.getElementById('data-container');
                tableData.forEach(row => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const cols = row.c;

                    card.innerHTML = `
                        <div class="label">직군:</div> ${cols[0]?.v || '정보 없음'}<br>
                        <div class="label">등급:</div> ${cols[1]?.v || '정보 없음'}<br>
                        <div class="label">구분:</div> ${cols[2]?.v || '정보 없음'}<br>
                        <div class="label">CHAPTER:</div> ${cols[3]?.v || '정보 없음'}<br>
                        <div class="label">기준제목:</div> ${cols[4]?.v || '정보 없음'}<br>
                        <div class="label">조사항목:</div> ${cols[5]?.v || '정보 없음'}<br>
                        <div class="label">조사내용:</div> ${cols[6]?.v || '정보 없음'}<br>
                    `;
                    container.appendChild(card);
                });
            })
            .catch(error => {
                console.error('데이터 로딩 중 오류 발생:', error);
            });
    </script>
</body>
</html>
