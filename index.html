<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>규정 조사 항목 뷰어</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Noto+Serif+KR:wght@600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1f1f1f;
      --surface3: #2a2a2a;
      --gold: #c9a84c;
      --gold2: #e8c97a;
      --text: #ede8df;
      --text-muted: #7a7468;
      --text-sub: #a09890;
      --border: #2a2a2a;
      --border2: #333;
      --success: #5cba8a;
      --warning: #d4a043;
      --danger: #c45c5c;
    }

    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* noise overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* ---- HEADER ---- */
    header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(13,13,13,0.95);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 0 40px;
      height: 64px;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .logo-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 3px;
      width: 32px;
      height: 32px;
      flex-shrink: 0;
    }

    .logo-grid span {
      border-radius: 2px;
    }
    .logo-grid span:nth-child(1) { background: var(--gold); }
    .logo-grid span:nth-child(2) { background: var(--gold2); opacity: 0.6; }
    .logo-grid span:nth-child(3) { background: var(--gold2); opacity: 0.6; }
    .logo-grid span:nth-child(4) { background: var(--gold); opacity: 0.3; }

    .logo-text {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .logo-text .eyebrow {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: 2.5px;
      color: var(--gold);
      text-transform: uppercase;
    }

    .logo-text h1 {
      font-family: 'Noto Serif KR', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: -0.3px;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(92,186,138,0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(92,186,138,0); }
    }

    /* ---- CONTAINER ---- */
    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 24px 80px;
      position: relative;
      z-index: 1;
    }

    /* ---- STATS ---- */
    .stats-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 36px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 22px;
      position: relative;
      overflow: hidden;
    }

    .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0;
      width: 100%; height: 2px;
      background: linear-gradient(90deg, var(--gold), transparent);
    }

    .stat-label {
      font-size: 10px;
      font-family: 'DM Mono', monospace;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .stat-value {
      font-family: 'Noto Serif KR', serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1;
    }

    /* ---- SEARCH ---- */
    .search-wrap {
      margin-bottom: 28px;
      position: relative;
    }

    .search-wrap svg {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }

    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 16px 12px 42px;
      font-size: 13px;
      font-family: 'Noto Sans KR', sans-serif;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-wrap input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
    }

    /* ---- TABS ---- */
    .tabs-scroll {
      overflow-x: auto;
      scrollbar-width: none;
      margin-bottom: 28px;
    }
    .tabs-scroll::-webkit-scrollbar { display: none; }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid var(--border);
      min-width: max-content;
    }

    .tab-btn {
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      margin-bottom: -1px;
      padding: 10px 18px;
      font-size: 12px;
      font-family: 'Noto Sans KR', sans-serif;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .tab-btn:hover { color: var(--text); }

    .tab-btn.active {
      color: var(--gold);
      border-bottom-color: var(--gold);
    }

    .tab-count {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      background: rgba(201,168,76,0.15);
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 20px;
      padding: 1px 7px;
    }

    /* ---- REG CARDS ---- */
    .reg-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .reg-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.25s;
    }

    .reg-card:hover { border-color: rgba(201,168,76,0.35); }
    .reg-card.expanded { border-color: rgba(201,168,76,0.5); }

    .reg-card-header {
      display: flex;
      align-items: center;
      padding: 18px 20px;
      cursor: pointer;
      user-select: none;
      gap: 14px;
    }

    .reg-num {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text-muted);
      min-width: 24px;
      flex-shrink: 0;
    }

    .reg-info {
      flex: 1;
      min-width: 0;
    }

    .reg-info h3 {
      font-family: 'Noto Serif KR', serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .reg-chips {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .chip {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      padding: 2px 9px;
      border-radius: 4px;
      border: 1px solid;
    }

    .chip-count {
      background: rgba(201,168,76,0.08);
      color: var(--gold2);
      border-color: rgba(201,168,76,0.2);
    }

    .chip-grade-A {
      background: rgba(92,186,138,0.1);
      color: var(--success);
      border-color: rgba(92,186,138,0.25);
    }

    .chip-grade-B {
      background: rgba(212,160,67,0.1);
      color: var(--warning);
      border-color: rgba(212,160,67,0.25);
    }

    .chip-grade-C {
      background: rgba(196,92,92,0.1);
      color: var(--danger);
      border-color: rgba(196,92,92,0.25);
    }

    .toggle-btn {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--border2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.2s, transform 0.3s;
    }

    .reg-card.expanded .toggle-btn {
      background: rgba(201,168,76,0.15);
      border-color: rgba(201,168,76,0.3);
      transform: none;
    }

    .toggle-btn svg {
      color: var(--text-muted);
      transition: transform 0.3s ease;
    }

    .reg-card.expanded .toggle-btn svg {
      transform: rotate(180deg);
      color: var(--gold);
    }

    /* ---- ACCORDION BODY ---- */
    .reg-card-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .reg-card.expanded .reg-card-body {
      max-height: 99999px;
    }

    .body-inner {
      padding: 0 20px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ---- ITEM CARD (세로) ---- */
    .item-card {
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 10px;
      overflow: hidden;
    }

    .item-card-top {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface3);
      border-bottom: 1px solid var(--border);
    }

    .item-seq {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
    }

    .item-grade {
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      padding: 2px 9px;
      border-radius: 4px;
      font-weight: 500;
      border: 1px solid;
    }

    .item-category {
      font-size: 11px;
      color: var(--text-sub);
      font-weight: 500;
    }

    .item-chapter {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text-muted);
      margin-left: auto;
    }

    /* ---- FIELD ROWS (세로 배치) ---- */
    .field-list {
      display: flex;
      flex-direction: column;
    }

    .field-row {
      display: grid;
      grid-template-columns: 110px 1fr;
      border-bottom: 1px solid rgba(42,42,42,0.6);
    }

    .field-row:last-child { border-bottom: none; }

    .field-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      padding: 11px 14px;
      background: rgba(0,0,0,0.2);
      border-right: 1px solid var(--border);
      display: flex;
      align-items: flex-start;
      padding-top: 13px;
      flex-shrink: 0;
    }

    .field-value {
      padding: 11px 14px;
      font-size: 13px;
      color: var(--text);
      line-height: 1.65;
      word-break: break-all;
    }

    .field-value.empty {
      color: var(--text-muted);
      font-style: italic;
      font-size: 12px;
    }

    /* ---- LOADING / ERROR / EMPTY ---- */
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      gap: 20px;
    }

    .spinner {
      width: 44px;
      height: 44px;
      border: 2px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading-text {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      letter-spacing: 1px;
    }

    .error-box {
      background: rgba(196,92,92,0.08);
      border: 1px solid rgba(196,92,92,0.25);
      border-radius: 10px;
      padding: 24px 28px;
      color: var(--danger);
      font-size: 13px;
      line-height: 1.7;
      max-width: 520px;
      margin: 60px auto;
    }

    .empty-state {
      text-align: center;
      padding: 60px 24px;
      color: var(--text-muted);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 1px;
    }

    @media (max-width: 640px) {
      header { padding: 0 16px; }
      .container { padding: 24px 14px 60px; }
      .stats-bar { grid-template-columns: repeat(3, 1fr); gap: 8px; }
      .stat-value { font-size: 24px; }
      .field-row { grid-template-columns: 80px 1fr; }
      .field-label { font-size: 9px; padding: 10px 10px; }
      .field-value { font-size: 12px; padding: 10px 12px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo-grid">
    <span></span><span></span>
    <span></span><span></span>
  </div>
  <div class="logo-text">
    <div class="eyebrow">Regulation Viewer</div>
    <h1>규정 조사 항목</h1>
  </div>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">로딩 중...</span>
  </div>
</header>

<div class="container">

  <!-- LOADING -->
  <div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <div class="loading-text">LOADING DATA...</div>
  </div>

  <!-- ERROR -->
  <div id="errorScreen" style="display:none;"></div>

  <!-- MAIN -->
  <div id="mainContent" style="display:none;">

    <div class="stats-bar">
      <div class="stat-card">
        <div class="stat-label">Total Items</div>
        <div class="stat-value" id="statTotal">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Regulations</div>
        <div class="stat-value" id="statRegs">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Job Groups</div>
        <div class="stat-value" id="statGroups">0</div>
      </div>
    </div>

    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" id="searchInput" placeholder="규정 제목, 조사 항목, 기준 제목으로 검색..." />
    </div>

    <div class="tabs-scroll">
      <div class="tabs" id="tabsContainer"></div>
    </div>

    <div class="reg-list" id="regList"></div>

  </div>
</div>

<script>
  const SPREADSHEET_ID = '18dDgxsczklu9FRm053w2rqLDFDjqm7C18rijuyJdrkI';
  const CSV_URL = `https://docs.google.com/spreadsheets/d/${SPREADSHEET_ID}/export?format=csv&gid=0`;

  const COL = {
    규정제목: 0,
    직군: 1,
    조사항목등급: 2,
    조사항목구분: 3,
    조사항목장: 4,
    기준제목: 5,
    기준: 6,
    조사항목: 7,
    기준이해: 8,
    조사내용: 9,
    조사목적: 10,
    참고자료: 11,
  };

  const FIELDS = [
    { label: '직군',       key: COL.직군 },
    { label: '등급',       key: COL.조사항목등급 },
    { label: '구분',       key: COL.조사항목구분 },
    { label: 'Chapter',   key: COL.조사항목장 },
    { label: '기준 제목', key: COL.기준제목 },
    { label: '기준',       key: COL.기준 },
    { label: '조사 항목', key: COL.조사항목 },
    { label: '기준 이해', key: COL.기준이해 },
    { label: '조사 내용', key: COL.조사내용 },
    { label: '조사 목적', key: COL.조사목적 },
    { label: '참고 자료', key: COL.참고자료 },
  ];

  let allRows = [];
  let currentTab = '전체';
  let searchQuery = '';

  /* ── CSV 파싱 ── */
  function parseCSV(text) {
    const lines = [];
    let cur = '', inQ = false, row = [];
    for (let i = 0; i < text.length; i++) {
      const ch = text[i];
      if (ch === '"') {
        if (inQ && text[i+1] === '"') { cur += '"'; i++; }
        else { inQ = !inQ; }
      } else if (ch === ',' && !inQ) {
        row.push(cur.trim()); cur = '';
      } else if ((ch === '\n' || ch === '\r') && !inQ) {
        if (ch === '\r' && text[i+1] === '\n') i++;
        row.push(cur.trim()); cur = '';
        lines.push(row); row = [];
      } else {
        cur += ch;
      }
    }
    if (cur || row.length) { row.push(cur.trim()); lines.push(row); }
    return lines;
  }

  /* ── 데이터 로드 ── */
  async function loadData() {
    try {
      const res = await fetch(CSV_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      const text = await res.text();
      const rows = parseCSV(text);
      if (rows.length < 2) throw new Error('데이터가 없습니다.');

      allRows = rows.slice(1).filter(r => r.some(c => c !== ''));

      const regSet   = new Set(allRows.map(r => r[COL.규정제목]).filter(Boolean));
      const groupSet = new Set(allRows.map(r => r[COL.직군]).filter(Boolean));

      animateCount('statTotal',  allRows.length);
      animateCount('statRegs',   regSet.size);
      animateCount('statGroups', groupSet.size);

      buildTabs(groupSet);

      document.getElementById('statusDot').style.background = '#5cba8a';
      document.getElementById('statusText').textContent = allRows.length + '개 항목 로드 완료';
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('mainContent').style.display  = 'block';

      render();
    } catch (err) {
      document.getElementById('loadingScreen').style.display = 'none';
      document.getElementById('statusDot').style.background = '#c45c5c';
      document.getElementById('statusText').textContent = '로드 실패';
      const el = document.getElementById('errorScreen');
      el.style.display = 'block';
      el.innerHTML = `<div class="error-box">
        <strong>데이터를 불러오지 못했습니다.</strong><br/><br/>
        ${escHtml(err.message)}<br/><br/>
        <small>구글 시트 공개 설정을 확인해주세요.</small>
      </div>`;
    }
  }

  /* ── 카운트업 애니메이션 ── */
  function animateCount(id, target) {
    const el = document.getElementById(id);
    let start = 0;
    const step = Math.ceil(target / 30);
    const timer = setInterval(() => {
      start = Math.min(start + step, target);
      el.textContent = start.toLocaleString();
      if (start >= target) clearInterval(timer);
    }, 30);
  }

  /* ── 탭 생성 ── */
  function buildTabs(groupSet) {
    const container = document.getElementById('tabsContainer');
    container.innerHTML = '';
    const groups = ['전체', ...Array.from(groupSet).sort()];

    groups.forEach(g => {
      const count = g === '전체'
        ? allRows.length
        : allRows.filter(r => r[COL.직군] === g).length;

      const btn = document.createElement('button');
      btn.className = 'tab-btn' + (g === currentTab ? ' active' : '');
      btn.innerHTML = `${escHtml(g)} <span class="tab-count">${count}</span>`;
      btn.addEventListener('click', () => {
        currentTab = g;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        render();
      });
      container.appendChild(btn);
    });
  }

  /* ── 필터 ── */
  function getFiltered() {
    return allRows.filter(r => {
      if (currentTab !== '전체' && r[COL.직군] !== currentTab) return false;
      if (!searchQuery) return true;
      const q = searchQuery.toLowerCase();
      return (
        (r[COL.규정제목]  || '').toLowerCase().includes(q) ||
        (r[COL.기준제목]  || '').toLowerCase().includes(q) ||
        (r[COL.조사항목]  || '').toLowerCase().includes(q) ||
        (r[COL.직군]      || '').toLowerCase().includes(q)
      );
    });
  }

  /* ── 등급 스타일 ── */
  function gradeClass(g) {
    if (!g) return '';
    const up = g.toUpperCase();
    if (up === 'A' || up === '필수') return 'chip-grade-A';
    if (up === 'B') return 'chip-grade-B';
    if (up === 'C') return 'chip-grade-C';
    return '';
  }

  /* ── 개별 항목 카드 HTML (세로 필드 목록) ── */
  function buildItemCard(row, idx) {
    const grade = row[COL.조사항목등급] || '';
    const gClass = gradeClass(grade);

    const topHtml = `
      <div class="item-card-top">
        <span class="item-seq">#${String(idx + 1).padStart(2, '0')}</span>
        ${grade ? `<span class="item-grade ${gClass}">${escHtml(grade)}</span>` : ''}
        ${row[COL.조사항목구분] ? `<span class="item-category">${escHtml(row[COL.조사항목구분])}</span>` : ''}
        ${row[COL.조사항목장] ? `<span class="item-chapter">${escHtml(row[COL.조사항목장])}</span>` : ''}
      </div>`;

    const fieldHtml = FIELDS.map(f => {
      const val = row[f.key] || '';
      return `
        <div class="field-row">
          <div class="field-label">${f.label}</div>
          <div class="field-value${val ? '' : ' empty'}">${val ? escHtml(val) : '없음'}</div>
        </div>`;
    }).join('');

    return `
      <div class="item-card">
        ${topHtml}
        <div class="field-list">
          ${fieldHtml}
        </div>
      </div>`;
  }

  /* ── 메인 렌더 ── */
  function render() {
    const filtered = getFiltered();
    const container = document.getElementById('regList');
    container.innerHTML = '';

    if (filtered.length === 0) {
      container.innerHTML = '<div class="empty-state">표시할 데이터가 없습니다.</div>';
      return;
    }

    /* 규정제목별 그룹화 */
    const grouped = {};
    const groupOrder = [];
    filtered.forEach(r => {
      const title = r[COL.규정제목] || '(제목 없음)';
      if (!grouped[title]) { grouped[title] = []; groupOrder.push(title); }
      grouped[title].push(r);
    });

    groupOrder.forEach((title, i) => {
      const rows = grouped[title];

      /* 등급별 칩 집계 */
      const gradeCounts = {};
      rows.forEach(r => {
        const g = (r[COL.조사항목등급] || '').trim();
        if (g) gradeCounts[g] = (gradeCounts[g] || 0) + 1;
      });

      const gradeChips = Object.entries(gradeCounts)
        .map(([g, cnt]) => `<span class="chip ${gradeClass(g)}">${escHtml(g)} ${cnt}</span>`)
        .join('');

      const card = document.createElement('div');
      card.className = 'reg-card';
      card.innerHTML = `
        <div class="reg-card-header">
          <span class="reg-num">${String(i + 1).padStart(2, '0')}</span>
          <div class="reg-info">
            <h3>${escHtml(title)}</h3>
            <div class="reg-chips">
              <span class="chip chip-count">${rows.length}개 항목</span>
              ${gradeChips}
            </div>
          </div>
          <div class="toggle-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
              <polyline points="6 9 12 15 18 9"/>
            </svg>
          </div>
        </div>
        <div class="reg-card-body">
          <div class="body-inner"></div>
        </div>`;

      const header  = card.querySelector('.reg-card-header');
      const body    = card.querySelector('.reg-card-body');
      const inner   = card.querySelector('.body-inner');
      let rendered  = false;

      header.addEventListener('click', () => {
        const isOpen = card.classList.toggle('expanded');

        /* 최초 클릭 시 내용 렌더링 */
        if (isOpen && !rendered) {
          rendered = true;
          inner.innerHTML = rows.map((r, idx) => buildItemCard(r, idx)).join('');
        }

        /* max-height 수동 설정 (transition용) */
        if (isOpen) {
          body.style.maxHeight = body.scrollHeight + inner.scrollHeight + 'px';
          /* 렌더 후 실제 높이 재적용 */
          requestAnimationFrame(() => {
            body.style.maxHeight = body.scrollHeight + 'px';
          });
        } else {
          body.style.maxHeight = '0';
        }
      });

      container.appendChild(card);
    });
  }

  /* ── HTML 이스케이프 ── */
  function escHtml(str) {
    if (str === undefined || str === null) return '';
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  /* ── 검색 ── */
  document.getElementById('searchInput').addEventListener('input', e => {
    searchQuery = e.target.value.trim();
    render();
  });

  /* ── 시작 ── */
  loadData();
</script>
</body>
</html>
